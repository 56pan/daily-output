<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日々のアウトプット</title>
  <style>
    .url-link {
      color: #2980b9;
      text-decoration: underline;
      cursor: pointer;
      word-break: break-all;
    }
    .url-link:hover { color: #1a5f8a; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: #f0f2f5;
      color: #333;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ===== HEADER ===== */
    header {
      background: #2c3e50;
      color: white;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    header h1 { font-size: 17px; font-weight: 600; letter-spacing: 0.5px; }
    .version {
      font-size: 11px;
      background: rgba(255,255,255,0.15);
      padding: 3px 8px;
      border-radius: 12px;
      letter-spacing: 0.3px;
    }

    /* ===== LAYOUT ===== */
    .app-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ===== LEFT PANEL (Calendar) ===== */
    .left-panel {
      width: 300px;
      min-width: 260px;
      background: white;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .calendar-container { padding: 16px; }

    .calendar-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .calendar-nav h2 { font-size: 15px; font-weight: 700; color: #2c3e50; }
    .cal-nav-btn {
      background: none;
      border: 1px solid #ddd;
      cursor: pointer;
      font-size: 16px;
      color: #555;
      padding: 3px 9px;
      border-radius: 6px;
      line-height: 1.4;
      transition: background 0.15s;
    }
    .cal-nav-btn:hover { background: #f5f5f5; }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .cal-header {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: #999;
      padding: 4px 0 6px;
    }
    .cal-header.sat { color: #3498db; }
    .cal-header.sun { color: #e74c3c; }

    .cal-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 5px;
      cursor: pointer;
      border-radius: 8px;
      min-height: 38px;
      font-size: 13px;
      transition: background 0.15s;
      position: relative;
    }
    .cal-day:hover { background: #f0f4f8; }
    .cal-day.other-month { color: #ccc; cursor: default; }
    .cal-day.other-month:hover { background: none; }

    .cal-day.today .day-num {
      background: #2c3e50;
      color: white;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .cal-day.selected .day-num {
      background: #3498db;
      color: white;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .cal-day.today.selected .day-num {
      background: #e67e22;
    }

    .day-num {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .output-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #27ae60;
      margin-top: 2px;
    }
    .cal-day.today .output-dot,
    .cal-day.selected .output-dot { background: rgba(255,255,255,0.85); }
    .cal-day.today.selected .output-dot { background: rgba(255,255,255,0.85); }

    /* ===== RIGHT PANEL ===== */
    .right-panel {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ===== SECTIONS ===== */
    .panel-section {
      background: white;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: #555;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-title .badge {
      font-size: 11px;
      background: #3498db;
      color: white;
      padding: 1px 7px;
      border-radius: 10px;
      font-weight: 600;
    }

    /* ===== FORM ===== */
    .output-form { display: flex; flex-direction: column; gap: 10px; }
    .form-field { display: flex; flex-direction: column; gap: 4px; }
    .form-field label {
      font-size: 12px;
      font-weight: 700;
      color: #555;
    }
    .form-field textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      resize: vertical;
      min-height: 56px;
      font-family: inherit;
      color: #333;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.5;
    }
    .form-field textarea:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 0 3px rgba(52,152,219,0.12);
    }
    .form-field textarea:disabled {
      background: #fafafa;
      color: #555;
      cursor: default;
    }

    .form-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    /* ===== BUTTONS ===== */
    .btn {
      padding: 7px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      transition: background 0.15s, opacity 0.15s;
      letter-spacing: 0.2px;
    }
    .btn:hover { opacity: 0.88; }
    .btn-primary { background: #3498db; color: white; }
    .btn-secondary { background: #ecf0f1; color: #555; }
    .btn-warning { background: #f39c12; color: white; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }

    /* ===== SAVED OUTPUT ENTRIES ===== */
    .output-entry {
      border: 1px solid #e8eaed;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    .output-entry:last-child { margin-bottom: 0; }
    .output-entry:hover { border-color: #c5d3e0; }
    .output-entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .entry-num {
      font-size: 12px;
      font-weight: 700;
      color: #3498db;
      background: #ebf5fb;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .entry-actions { display: flex; gap: 6px; }

    .field-view { display: flex; flex-direction: column; gap: 8px; }
    .field-item { display: flex; flex-direction: column; gap: 2px; }
    .field-label {
      font-size: 11px;
      font-weight: 700;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .field-value {
      font-size: 13px;
      color: #333;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    /* ===== SUMMARY ===== */
    .summary-content { font-size: 13px; color: #555; }
    .summary-stat {
      font-size: 12px;
      color: #888;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .summary-date-group { margin-bottom: 10px; }
    .summary-date-label {
      font-size: 12px;
      font-weight: 700;
      color: #2c3e50;
      margin-bottom: 4px;
    }
    .summary-item {
      background: #f8f9fa;
      border-left: 3px solid #3498db;
      border-radius: 0 6px 6px 0;
      padding: 6px 10px;
      margin-bottom: 4px;
      font-size: 12px;
      line-height: 1.5;
    }
    .summary-item strong { color: #3498db; }
    .summary-item .s-row { color: #555; }
    .summary-item .s-label { color: #999; font-weight: 700; }

    .empty-message {
      color: #bbb;
      font-size: 13px;
      text-align: center;
      padding: 16px 0;
    }

    .no-date-message {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: #bbb;
      gap: 8px;
    }
    .no-date-message .arrow { font-size: 28px; }
    .no-date-message p { font-size: 14px; }

    /* ===== LEFT PANEL EXTRA (below calendar) ===== */
    .left-extra {
      border-top: 1px solid #f0f0f0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .left-section {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    .left-section:last-child { border-bottom: none; }
    .left-section-title {
      font-size: 12px;
      font-weight: 700;
      color: #555;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .left-section-title .badge {
      font-size: 10px;
      background: #3498db;
      color: white;
      padding: 1px 6px;
      border-radius: 10px;
    }
    .todo-box {
      background: #fffbf0;
      border: 1px solid #f0d080;
      border-left: 3px solid #f39c12;
      border-radius: 0 6px 6px 0;
      padding: 8px 10px;
      font-size: 12px;
      color: #555;
      white-space: pre-wrap;
      line-height: 1.5;
      word-break: break-word;
    }
    .left-summary-item {
      background: #f8f9fa;
      border-left: 3px solid #3498db;
      border-radius: 0 5px 5px 0;
      padding: 5px 8px;
      margin-bottom: 4px;
      font-size: 11px;
      line-height: 1.5;
      color: #555;
    }
    .left-summary-item:last-child { margin-bottom: 0; }
    .left-summary-item strong { color: #3498db; font-size: 11px; }
    .left-summary-date {
      font-size: 11px;
      font-weight: 700;
      color: #2c3e50;
      margin: 6px 0 3px;
    }
    .left-stat {
      font-size: 11px;
      color: #999;
      margin-bottom: 6px;
    }
    .left-empty {
      font-size: 11px;
      color: #ccc;
      text-align: center;
      padding: 8px 0;
    }
  </style>
</head>
<body>

<header>
  <h1>日々のアウトプット</h1>
  <span class="version">v1.1.0</span>
</header>

<div class="app-container">
  <div class="left-panel">
    <div class="calendar-container">
      <div class="calendar-nav">
        <button class="cal-nav-btn" id="prevMonth">&#8249;</button>
        <h2 id="calTitle"></h2>
        <button class="cal-nav-btn" id="nextMonth">&#8250;</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
    <div class="left-extra" id="leftExtra"></div>
  </div>

  <div class="right-panel" id="rightPanel">
    <div class="no-date-message">
      <span class="arrow">&#8592;</span>
      <p>カレンダーから日付を選択してください</p>
    </div>
  </div>
</div>

<script>
  const VERSION = 'v1.0.0';
  const FIELD_DEFS = [
    { key: 'experience',        label: '① 経験' },
    { key: 'reflection',        label: '② 振り返り' },
    { key: 'conceptualization', label: '③ 概念化（他の状況への応用・学び）' },
    { key: 'practice',          label: '④ 実践' },
    { key: 'notes',             label: '⑤ その他メモ' },
    { key: 'tomorrow_todo',     label: '⑥ 明日のToDo' },
  ];

  // --- State ---
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  let currentYear  = today.getFullYear();
  let currentMonth = today.getMonth();
  let selectedDate = null;

  // --- Persistence ---
  function loadData() {
    try { return JSON.parse(localStorage.getItem('outputData') || '{}'); }
    catch { return {}; }
  }
  function saveData(data) {
    localStorage.setItem('outputData', JSON.stringify(data));
  }

  // --- Utilities ---
  function formatDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }
  function todayStr() { return formatDate(today); }

  function formatDateJP(dateStr) {
    const [y, m, d] = dateStr.split('-');
    return `${y}年${parseInt(m)}月${parseInt(d)}日`;
  }
  function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
  }
  function escHtml(str) {
    if (!str) return '';
    return str
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }
  function trunc(str, n) {
    if (!str) return '';
    return str.length > n ? str.substring(0, n) + '…' : str;
  }

  // Escape HTML then linkify URLs — Ctrl+click opens in new tab
  function linkifyText(str) {
    if (!str) return '';
    const escaped = escHtml(str);
    return escaped.replace(/(https?:\/\/[^\s<>"&]+)/g, url =>
      `<a href="${url}" target="_blank" class="url-link" onclick="if(!event.ctrlKey){event.preventDefault()}">${url}</a>`
    );
  }

  // Date offset utility
  function offsetDate(dateStr, days) {
    const d = new Date(dateStr);
    d.setDate(d.getDate() + days);
    return formatDate(d);
  }

  // --- Calendar ---
  function renderCalendar() {
    const data = loadData();
    const daysWithOutput = new Set(
      Object.keys(data).filter(k => (data[k] || []).length > 0)
    );

    document.getElementById('calTitle').textContent =
      `${currentYear}年${currentMonth + 1}月`;

    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';

    // Day-of-week headers (Mon start)
    const dayNames = [
      { label: '月', cls: '' }, { label: '火', cls: '' }, { label: '水', cls: '' },
      { label: '木', cls: '' }, { label: '金', cls: '' },
      { label: '土', cls: 'sat' }, { label: '日', cls: 'sun' },
    ];
    dayNames.forEach(({ label, cls }) => {
      const h = document.createElement('div');
      h.className = 'cal-header' + (cls ? ' ' + cls : '');
      h.textContent = label;
      grid.appendChild(h);
    });

    // First weekday of month (Mon=0 ... Sun=6)
    const firstDow = (new Date(currentYear, currentMonth, 1).getDay() + 6) % 7;
    const lastDate  = new Date(currentYear, currentMonth + 1, 0).getDate();
    const prevLast  = new Date(currentYear, currentMonth, 0).getDate();

    // Prev-month fillers
    for (let i = firstDow - 1; i >= 0; i--) {
      const el = document.createElement('div');
      el.className = 'cal-day other-month';
      el.innerHTML = `<span class="day-num">${prevLast - i}</span>`;
      grid.appendChild(el);
    }

    // Current month days
    for (let d = 1; d <= lastDate; d++) {
      const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday    = dateStr === todayStr();
      const isSel      = dateStr === selectedDate;
      const hasOutput  = daysWithOutput.has(dateStr);

      const el = document.createElement('div');
      el.className = 'cal-day' + (isToday ? ' today' : '') + (isSel ? ' selected' : '');

      let inner = `<span class="day-num">${d}</span>`;
      if (hasOutput) inner += `<span class="output-dot"></span>`;
      el.innerHTML = inner;

      el.addEventListener('click', () => selectDate(dateStr));
      grid.appendChild(el);
    }

    // Next-month fillers
    const filled = firstDow + lastDate;
    const remainder = filled % 7 === 0 ? 0 : 7 - (filled % 7);
    for (let i = 1; i <= remainder; i++) {
      const el = document.createElement('div');
      el.className = 'cal-day other-month';
      el.innerHTML = `<span class="day-num">${i}</span>`;
      grid.appendChild(el);
    }
  }

  function selectDate(dateStr) {
    selectedDate = dateStr;
    renderCalendar();
    renderLeftPanel();
    renderRightPanel();
  }

  // --- Right panel ---
  function renderRightPanel() {
    const panel = document.getElementById('rightPanel');
    panel.innerHTML = '';

    if (!selectedDate) {
      panel.innerHTML = `
        <div class="no-date-message">
          <span class="arrow">&#8592;</span>
          <p>カレンダーから日付を選択してください</p>
        </div>`;
      return;
    }

    const data = loadData();
    const dayOutputs = data[selectedDate] || [];

    // 1. New output form
    panel.appendChild(buildNewOutputSection());

    // 2. Saved outputs for the day
    if (dayOutputs.length > 0) {
      panel.appendChild(buildSavedOutputsSection(dayOutputs));
    }

    // 3. Day summary
    panel.appendChild(buildDaySummary(data));
  }

  // --- Left panel extra (ToDo / Week / Month) ---
  function renderLeftPanel() {
    const extra = document.getElementById('leftExtra');
    extra.innerHTML = '';
    if (!selectedDate) return;

    const data = loadData();

    // 1. Previous day's ToDo
    const prevDate = offsetDate(selectedDate, -1);
    const prevOutputs = data[prevDate] || [];
    const todoTexts = prevOutputs
      .map(o => o.tomorrow_todo)
      .filter(t => t && t.trim());

    if (todoTexts.length > 0) {
      const sec = document.createElement('div');
      sec.className = 'left-section';
      sec.innerHTML = `
        <div class="left-section-title">
          前日のToDo
          <span style="font-size:10px;color:#999;font-weight:400;">${formatDateJP(prevDate)}より</span>
        </div>
        ${todoTexts.map(t => `<div class="todo-box">${linkifyText(t)}</div>`).join('<div style="height:4px"></div>')}`;
      extra.appendChild(sec);
    }

    // 2. Week summary
    extra.appendChild(buildWeekSummaryLeft(data));

    // 3. Month summary
    extra.appendChild(buildMonthSummaryLeft(data));
  }

  function buildWeekSummaryLeft(data) {
    const sec = document.createElement('div');
    sec.className = 'left-section';

    const sel = new Date(selectedDate);
    const dow = (sel.getDay() + 6) % 7;
    const mon = new Date(sel); mon.setDate(sel.getDate() - dow);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);

    const weekDates = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(mon); d.setDate(mon.getDate() + i);
      weekDates.push(formatDate(d));
    }
    const activeDates = weekDates.filter(d => (data[d] || []).length > 0);
    const total = activeDates.reduce((s, d) => s + data[d].length, 0);

    const monStr = `${parseInt(formatDate(mon).split('-')[1])}/${parseInt(formatDate(mon).split('-')[2])}`;
    const sunStr = `${parseInt(formatDate(sun).split('-')[1])}/${parseInt(formatDate(sun).split('-')[2])}`;

    let body;
    if (activeDates.length === 0) {
      body = '<div class="left-empty">今週のアウトプットはありません</div>';
    } else {
      body = `<div class="left-stat">記録${activeDates.length}日 / 合計${total}件</div>` +
        activeDates.map(d => {
          const [,m,dd] = d.split('-');
          return `<div class="left-summary-date">${parseInt(m)}月${parseInt(dd)}日</div>` +
            (data[d] || []).map((o, i) => {
              const rows = FIELD_DEFS.filter(f => f.key !== 'tomorrow_todo' && o[f.key])
                .map(f => `<div><span style="color:#aaa;font-weight:700;">${f.label}：</span>${linkifyText(trunc(o[f.key], 40))}</div>`)
                .join('');
              return `<div class="left-summary-item"><strong>#${i+1}</strong>${rows}</div>`;
            }).join('');
        }).join('');
    }

    sec.innerHTML = `
      <div class="left-section-title">週のまとめ <span style="font-size:10px;color:#999;font-weight:400;">${monStr}〜${sunStr}</span></div>
      ${body}`;
    return sec;
  }

  function buildMonthSummaryLeft(data) {
    const sec = document.createElement('div');
    sec.className = 'left-section';

    const sel   = new Date(selectedDate);
    const year  = sel.getFullYear();
    const month = sel.getMonth();

    const activeDates = Object.keys(data)
      .filter(d => { const dt = new Date(d); return dt.getFullYear() === year && dt.getMonth() === month && data[d].length > 0; })
      .sort();
    const total = activeDates.reduce((s, d) => s + data[d].length, 0);

    let body;
    if (activeDates.length === 0) {
      body = '<div class="left-empty">今月のアウトプットはありません</div>';
    } else {
      body = `<div class="left-stat">記録${activeDates.length}日 / 合計${total}件</div>` +
        activeDates.map(d => {
          const [,m,dd] = d.split('-');
          return `<div class="left-summary-date">${parseInt(m)}月${parseInt(dd)}日</div>` +
            (data[d] || []).map((o, i) => {
              const rows = FIELD_DEFS.filter(f => f.key !== 'tomorrow_todo' && o[f.key])
                .map(f => `<div><span style="color:#aaa;font-weight:700;">${f.label}：</span>${linkifyText(trunc(o[f.key], 40))}</div>`)
                .join('');
              return `<div class="left-summary-item"><strong>#${i+1}</strong>${rows}</div>`;
            }).join('');
        }).join('');
    }

    sec.innerHTML = `
      <div class="left-section-title">月のまとめ <span style="font-size:10px;color:#999;font-weight:400;">${year}年${month+1}月</span></div>
      ${body}`;
    return sec;
  }

  // --- New output form ---
  function buildNewOutputSection() {
    const sec = document.createElement('div');
    sec.className = 'panel-section';
    sec.innerHTML = `
      <div class="section-title">
        新規アウトプット追加
        <span style="font-size:12px;color:#999;font-weight:400;">${formatDateJP(selectedDate)}</span>
      </div>
      <div class="output-form" id="newOutputForm">
        ${FIELD_DEFS.map(f => `
          <div class="form-field">
            <label for="nf_${f.key}">${escHtml(f.label)}</label>
            <textarea id="nf_${f.key}" placeholder="${fieldPlaceholder(f.key)}" rows="2"></textarea>
          </div>
        `).join('')}
        <div class="form-actions">
          <button class="btn btn-secondary" onclick="clearNewForm()">クリア</button>
          <button class="btn btn-primary" onclick="saveNewOutput()">保存</button>
        </div>
      </div>`;
    return sec;
  }

  function fieldPlaceholder(key) {
    const map = {
      experience:        '今日の経験・出来事を記録してください...',
      reflection:        '振り返ってみて気づいたこと...',
      conceptualization: 'この経験から学んだこと・他に応用できる概念...',
      practice:          '次にどう実践するか...',
      notes:             'その他のメモ、気になったこと...',
      tomorrow_todo:     '明日やること・取り組みたいこと...',
    };
    return map[key] || '';
  }

  function clearNewForm() {
    FIELD_DEFS.forEach(f => {
      const el = document.getElementById(`nf_${f.key}`);
      if (el) el.value = '';
    });
  }

  function saveNewOutput() {
    const entry = { id: generateId(), createdAt: new Date().toISOString() };
    FIELD_DEFS.forEach(f => {
      entry[f.key] = (document.getElementById(`nf_${f.key}`)?.value || '').trim();
    });

    if (!FIELD_DEFS.some(f => entry[f.key])) {
      alert('少なくとも1つの項目を入力してください。');
      return;
    }

    const data = loadData();
    if (!data[selectedDate]) data[selectedDate] = [];
    data[selectedDate].push(entry);
    saveData(data);

    clearNewForm();
    renderCalendar();
    renderRightPanel();
  }

  // --- Saved outputs ---
  function buildSavedOutputsSection(outputs) {
    const sec = document.createElement('div');
    sec.className = 'panel-section';
    sec.innerHTML = `
      <div class="section-title">
        保存済みアウトプット
        <span class="badge">${outputs.length}件</span>
      </div>`;
    outputs.forEach((o, i) => sec.appendChild(buildOutputEntry(o, i + 1)));
    return sec;
  }

  function buildOutputEntry(output, num) {
    const entry = document.createElement('div');
    entry.className = 'output-entry';
    entry.id = `entry_${output.id}`;

    const viewHtml = FIELD_DEFS
      .filter(f => output[f.key])
      .map(f => `
        <div class="field-item">
          <span class="field-label">${escHtml(f.label)}</span>
          <span class="field-value">${linkifyText(output[f.key])}</span>
        </div>`)
      .join('');

    const editHtml = FIELD_DEFS.map(f => `
      <div class="form-field">
        <label>${escHtml(f.label)}</label>
        <textarea id="ef_${output.id}_${f.key}" rows="2">${escHtml(output[f.key] || '')}</textarea>
      </div>`).join('');

    entry.innerHTML = `
      <div class="output-entry-header">
        <span class="entry-num">アウトプット #${num}</span>
        <div class="entry-actions" id="actions_view_${output.id}">
          <button class="btn btn-warning btn-sm" onclick="startEdit('${output.id}')">編集</button>
          <button class="btn btn-danger btn-sm" onclick="deleteOutput('${output.id}')">削除</button>
        </div>
        <div class="entry-actions" id="actions_edit_${output.id}" style="display:none;">
          <button class="btn btn-secondary btn-sm" onclick="cancelEdit('${output.id}')">キャンセル</button>
          <button class="btn btn-primary btn-sm" onclick="saveEdit('${output.id}')">保存</button>
        </div>
      </div>
      <div class="field-view" id="view_${output.id}">${viewHtml || '<span style="color:#ccc;font-size:12px;">（内容なし）</span>'}</div>
      <div class="output-form" id="edit_${output.id}" style="display:none;">${editHtml}</div>`;

    return entry;
  }

  function startEdit(id) {
    document.getElementById(`view_${id}`).style.display = 'none';
    document.getElementById(`edit_${id}`).style.display  = 'flex';
    document.getElementById(`edit_${id}`).style.flexDirection = 'column';
    document.getElementById(`edit_${id}`).style.gap = '10px';
    document.getElementById(`actions_view_${id}`).style.display = 'none';
    document.getElementById(`actions_edit_${id}`).style.display = 'flex';
  }

  function cancelEdit(id) {
    document.getElementById(`view_${id}`).style.display = 'flex';
    document.getElementById(`edit_${id}`).style.display  = 'none';
    document.getElementById(`actions_view_${id}`).style.display = 'flex';
    document.getElementById(`actions_edit_${id}`).style.display = 'none';
  }

  function saveEdit(id) {
    const data = loadData();
    const dayData = data[selectedDate];
    if (!dayData) return;

    const idx = dayData.findIndex(e => e.id === id);
    if (idx === -1) return;

    FIELD_DEFS.forEach(f => {
      dayData[idx][f.key] = (document.getElementById(`ef_${id}_${f.key}`)?.value || '').trim();
    });
    dayData[idx].updatedAt = new Date().toISOString();

    saveData(data);
    renderRightPanel();
  }

  function deleteOutput(id) {
    if (!confirm('このアウトプットを削除しますか？')) return;
    const data = loadData();
    if (data[selectedDate]) {
      data[selectedDate] = data[selectedDate].filter(e => e.id !== id);
      if (data[selectedDate].length === 0) delete data[selectedDate];
    }
    saveData(data);
    renderCalendar();
    renderRightPanel();
  }

  // --- Summary helpers ---
  function summaryItems(outputs) {
    if (!outputs || outputs.length === 0) return '';
    return outputs.map((o, i) => {
      const rows = FIELD_DEFS
        .filter(f => o[f.key])
        .map(f => `<div class="s-row"><span class="s-label">${escHtml(f.label)}：</span>${linkifyText(trunc(o[f.key], 60))}</div>`)
        .join('');
      return `<div class="summary-item"><strong>#${i + 1}</strong>${rows}</div>`;
    }).join('');
  }

  function buildDaySummary(data) {
    const sec = document.createElement('div');
    sec.className = 'panel-section';
    const outputs = data[selectedDate] || [];
    sec.innerHTML = `
      <div class="section-title">その日のまとめ <span style="font-weight:400;color:#999;font-size:12px;">${formatDateJP(selectedDate)}</span></div>
      <div class="summary-content">
        ${outputs.length === 0
          ? '<div class="empty-message">この日のアウトプットはありません</div>'
          : `<div class="summary-stat">アウトプット数：${outputs.length}件</div>${summaryItems(outputs)}`}
      </div>`;
    return sec;
  }

  function buildWeekSummary(data) {
    const sec = document.createElement('div');
    sec.className = 'panel-section';

    const sel  = new Date(selectedDate);
    const dow  = (sel.getDay() + 6) % 7;
    const mon  = new Date(sel); mon.setDate(sel.getDate() - dow);
    const sun  = new Date(mon); sun.setDate(mon.getDate() + 6);

    const weekDates = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(mon); d.setDate(mon.getDate() + i);
      weekDates.push(formatDate(d));
    }
    const activeDates = weekDates.filter(d => (data[d] || []).length > 0);
    const total = activeDates.reduce((s, d) => s + data[d].length, 0);

    const bodyHtml = activeDates.length === 0
      ? '<div class="empty-message">今週のアウトプットはありません</div>'
      : `<div class="summary-stat">記録日数：${activeDates.length}日 / 合計：${total}件</div>
         ${activeDates.map(d => `
           <div class="summary-date-group">
             <div class="summary-date-label">${formatDateJP(d)}</div>
             ${summaryItems(data[d])}
           </div>`).join('')}`;

    sec.innerHTML = `
      <div class="section-title">今週のまとめ
        <span style="font-weight:400;color:#999;font-size:12px;">${formatDateJP(formatDate(mon))} 〜 ${formatDateJP(formatDate(sun))}</span>
      </div>
      <div class="summary-content">${bodyHtml}</div>`;
    return sec;
  }

  function buildMonthSummary(data) {
    const sec = document.createElement('div');
    sec.className = 'panel-section';

    const sel   = new Date(selectedDate);
    const year  = sel.getFullYear();
    const month = sel.getMonth();

    const activeDates = Object.keys(data)
      .filter(d => { const dt = new Date(d); return dt.getFullYear() === year && dt.getMonth() === month && data[d].length > 0; })
      .sort();
    const total = activeDates.reduce((s, d) => s + data[d].length, 0);

    const bodyHtml = activeDates.length === 0
      ? '<div class="empty-message">今月のアウトプットはありません</div>'
      : `<div class="summary-stat">記録日数：${activeDates.length}日 / 合計：${total}件</div>
         ${activeDates.map(d => `
           <div class="summary-date-group">
             <div class="summary-date-label">${formatDateJP(d)}</div>
             ${summaryItems(data[d])}
           </div>`).join('')}`;

    sec.innerHTML = `
      <div class="section-title">今月のまとめ
        <span style="font-weight:400;color:#999;font-size:12px;">${year}年${month + 1}月</span>
      </div>
      <div class="summary-content">${bodyHtml}</div>`;
    return sec;
  }

  // --- Navigation ---
  document.getElementById('prevMonth').addEventListener('click', () => {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendar();
  });
  document.getElementById('nextMonth').addEventListener('click', () => {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    renderCalendar();
  });

  // --- Init ---
  renderCalendar();
  selectDate(todayStr());
</script>
</body>
</html>
