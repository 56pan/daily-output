<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日々のアウトプット</title>
  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Shippori+Mincho:wght@600;700;800&display=swap');

    :root {
      --ink-900: #141a22;
      --ink-800: #1d2530;
      --ink-700: #2a3542;
      --paper:   #f3efe6;
      --paper-2: #faf7f0;
      --surface: #fffdf8;
      --line:      #e6dfcf;
      --line-soft: #efe9db;
      --indigo:      #3f5e8c;
      --indigo-deep: #33517d;
      --indigo-soft: #edf3f9;
      --vermilion:      #c34f3c;
      --vermilion-deep: #a53c2c;
      --vermilion-soft: #fbeeea;
      --gold:      #b98429;
      --gold-soft: #fbf4e4;
      --green:      #35875a;
      --green-soft: #eaf6ee;
      --text:      #2c3038;
      --text-soft: #757b86;
      --text-faint:#adb2bc;
      --radius: 14px;
      --shadow-card: 0 1px 2px rgba(20,26,34,.05), 0 10px 30px -12px rgba(20,26,34,.12);
      --shadow-pop:  0 24px 70px -18px rgba(20,26,34,.45);
      --font-sans: 'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN','Yu Gothic UI','Segoe UI',sans-serif;
      --font-serif: 'Shippori Mincho','Hiragino Mincho ProN','Yu Mincho',serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background:
        radial-gradient(1200px 500px at 85% -10%, rgba(63,94,140,.07), transparent 60%),
        radial-gradient(900px 420px at -10% 110%, rgba(195,79,60,.06), transparent 55%),
        var(--paper);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    ::selection { background: rgba(195,79,60,.18); }

    /* scrollbars */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: #d4cdbc; border-radius: 8px;
      border: 2px solid transparent; background-clip: content-box;
    }
    ::-webkit-scrollbar-thumb:hover { background: #b9b1a0; background-clip: content-box; border: 2px solid transparent; }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(120deg, var(--ink-900) 0%, var(--ink-800) 55%, #223040 100%);
      color: white;
      padding: 12px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      gap: 10px;
      position: relative;
      box-shadow: 0 2px 14px rgba(20,26,34,.25);
    }
    header::after {
      content: '';
      position: absolute; left: 0; right: 0; bottom: 0; height: 2px;
      background: linear-gradient(90deg, var(--vermilion) 0%, #d98a53 45%, var(--gold) 100%);
      opacity: .9;
    }
    header h1 {
      font-family: var(--font-serif);
      font-size: 18px; font-weight: 700;
      letter-spacing: 3px; white-space: nowrap;
      display: flex; align-items: center; gap: 10px;
    }
    header h1::before {
      content: '';
      width: 10px; height: 10px; border-radius: 3px;
      background: var(--vermilion);
      box-shadow: 0 0 0 3px rgba(195,79,60,.25);
      flex-shrink: 0;
    }
    .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .version {
      font-size: 10px; letter-spacing: .5px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 3px 9px;
      border-radius: 20px;
      color: rgba(255,255,255,.65);
    }
    .storage-badge {
      font-size: 10px; font-weight: 700; letter-spacing: .5px;
      padding: 3px 10px; border-radius: 20px;
    }
    .storage-badge.firebase {
      background: linear-gradient(135deg, #2f9e63, #35875a);
      color: white; box-shadow: 0 2px 8px rgba(53,135,90,.4);
    }
    .storage-badge.local { background: rgba(255,255,255,0.08); color: rgba(255,255,255,.5); border: 1px solid rgba(255,255,255,.12); }

    /* User info in header */
    .user-info {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: rgba(255,255,255,0.82);
    }
    .user-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      object-fit: cover;
    }
    .user-avatar-placeholder {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--indigo), #2c4568);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: white;
      flex-shrink: 0;
    }
    .user-email { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-logout {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.16);
      color: rgba(255,255,255,0.75);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      transition: background .2s, color .2s;
      white-space: nowrap;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.16); color: white; }

    /* ===== LOGIN OVERLAY ===== */
    .login-overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(800px 400px at 70% 20%, rgba(63,94,140,.35), transparent 60%),
        rgba(17,22,29,0.93);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .login-card {
      background: var(--surface);
      border-radius: 22px;
      padding: 44px 48px;
      text-align: center;
      box-shadow: var(--shadow-pop);
      max-width: 380px;
      width: 90%;
      border-top: 4px solid var(--vermilion);
      animation: cardIn .35s cubic-bezier(.21,1.02,.55,1) both;
    }
    .login-card h2 { font-family: var(--font-serif); font-size: 22px; letter-spacing: 2px; color: var(--ink-800); margin-bottom: 10px; }
    .login-card p  { font-size: 13px; color: var(--text-soft); margin-bottom: 28px; line-height: 1.7; }
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%;
      background: white;
      border: 1.5px solid var(--line);
      border-radius: 12px;
      padding: 13px 20px;
      font-size: 14px; font-weight: 700; color: var(--text);
      font-family: inherit;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s, transform .15s;
    }
    .btn-google:hover { border-color: #4285f4; box-shadow: 0 6px 20px rgba(66,133,244,0.22); transform: translateY(-1px); }
    .btn-google svg { flex-shrink: 0; }
    .login-note { margin-top: 18px; font-size: 11px; color: var(--text-faint); line-height: 1.6; }

    /* ===== LAYOUT ===== */
    .app-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ===== LEFT PANEL ===== */
    .left-panel {
      width: 304px;
      min-width: 264px;
      background: var(--paper-2);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .calendar-container { padding: 18px 16px 14px; }
    .calendar-nav {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 14px;
    }
    .calendar-nav h2 {
      font-family: var(--font-serif);
      font-size: 16px; font-weight: 700; letter-spacing: 1.5px;
      color: var(--ink-800);
    }
    .cal-nav-btn {
      background: var(--surface); border: 1px solid var(--line);
      cursor: pointer; font-size: 16px; color: var(--text-soft);
      padding: 3px 9px; border-radius: 10px; line-height: 1.4;
      min-width: 34px; min-height: 34px;
      transition: all .18s;
      box-shadow: 0 1px 2px rgba(20,26,34,.05);
    }
    .cal-nav-btn:hover { background: var(--ink-800); color: white; border-color: var(--ink-800); }

    .calendar-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
    .cal-header { text-align: center; font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--text-faint); padding: 4px 0 8px; }
    .cal-header.sat { color: var(--indigo); }
    .cal-header.sun { color: var(--vermilion); }

    .cal-day {
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding-top: 5px; cursor: pointer;
      border-radius: 10px; min-height: 40px;
      font-size: 13px; transition: background .18s;
    }
    .cal-day:hover { background: rgba(63,94,140,.08); }
    .cal-day.other-month { color: #d8d2c4; cursor: default; }
    .cal-day.other-month:hover { background: none; }
    .day-num {
      width: 29px; height: 29px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      transition: all .18s;
    }
    .cal-day.today .day-num    { background: var(--ink-800); color: white; font-weight: 700; box-shadow: 0 3px 10px rgba(20,26,34,.35); }
    .cal-day.selected .day-num { background: var(--vermilion); color: white; font-weight: 700; box-shadow: 0 3px 10px rgba(195,79,60,.4); }
    .cal-day.today.selected .day-num { background: linear-gradient(135deg, var(--vermilion), var(--vermilion-deep)); }
    .output-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--gold); margin-top: 2px;
    }
    .cal-day.today .output-dot,
    .cal-day.selected .output-dot { background: rgba(255,255,255,0.9); }

    /* ===== LEFT EXTRA ===== */
    .left-extra { border-top: 1px solid var(--line-soft); display: flex; flex-direction: column; }
    .left-section { padding: 13px 16px; border-bottom: 1px solid var(--line-soft); }
    .left-section:last-child { border-bottom: none; }
    .left-section-title {
      font-size: 12px; font-weight: 700; color: var(--ink-700);
      letter-spacing: .5px;
      margin-bottom: 9px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .todo-item {
      display: flex; align-items: flex-start; gap: 8px;
      background: var(--gold-soft); border: 1px solid #ecd9ae;
      border-left: 3px solid var(--gold); border-radius: 4px 10px 10px 4px;
      padding: 8px 10px; font-size: 12px; color: var(--text);
      line-height: 1.55; word-break: break-word; margin-bottom: 5px;
      cursor: pointer;
      transition: box-shadow .18s, transform .18s;
    }
    .todo-item:hover { box-shadow: 0 3px 10px rgba(185,132,41,.16); }
    .todo-item input[type="checkbox"] {
      margin-top: 2px; flex-shrink: 0;
      width: 15px; height: 15px; cursor: pointer; accent-color: var(--gold);
    }
    .todo-item-text { flex: 1; }
    .todo-item input[type="checkbox"]:checked + .todo-item-text {
      text-decoration: line-through; color: var(--text-faint);
    }
    .left-summary-date { font-size: 11px; font-weight: 700; color: var(--ink-800); margin: 6px 0 3px; }
    .left-summary-item {
      background: var(--surface); border: 1px solid var(--line-soft); border-left: 3px solid var(--indigo);
      border-radius: 3px 8px 8px 3px; padding: 6px 9px;
      margin-bottom: 4px; font-size: 11px; line-height: 1.55; color: var(--text);
    }
    .left-summary-item strong { color: var(--indigo); font-size: 11px; }
    .left-stat { font-size: 11px; color: var(--text-soft); margin-bottom: 6px; }
    .left-empty { font-size: 11px; color: var(--text-faint); text-align: center; padding: 8px 0; }

    /* ===== MEMO BUTTONS ===== */
    .memo-buttons-section {
      padding: 13px 16px;
      display: flex; gap: 8px; flex-wrap: wrap;
      border-top: 1px solid var(--line-soft);
    }
    .btn-memo {
      flex: 1 1 calc(50% - 4px); padding: 10px 6px;
      border: 1px solid var(--line); border-radius: 11px;
      background: var(--surface); cursor: pointer;
      font-size: 12px; font-weight: 700; color: var(--text);
      font-family: inherit;
      transition: all .18s;
      box-shadow: 0 1px 2px rgba(20,26,34,.04);
    }
    .btn-memo:hover { transform: translateY(-1px); box-shadow: 0 5px 14px rgba(20,26,34,.1); }
    .btn-memo.idea  { border-color: #bfe0cb; color: var(--green); }
    .btn-memo.idea:hover  { background: var(--green-soft); }
    .btn-memo.maxim { border-color: #d8c8e8; color: #7d5ba6; }
    .btn-memo.maxim:hover { background: #f7f1fc; }
    .btn-memo.goal  { border-color: #ecc4ba; color: var(--vermilion); }
    .btn-memo.goal:hover  { background: var(--vermilion-soft); }
    .btn-memo.learning  { border-color: #bfd0e4; color: var(--indigo); }
    .btn-memo.learning:hover  { background: var(--indigo-soft); }
    .btn-memo.bookmark  { border-color: #e6d3a8; color: var(--gold); }
    .btn-memo.bookmark:hover  { background: var(--gold-soft); }
    .btn-memo.likedislike { border-color: #ecc4d4; color: #bb4f79; }
    .btn-memo.likedislike:hover { background: #fdf0f5; }

    /* ===== BOOKMARK BUTTON IN ENTRY ===== */
    .btn-bookmark {
      background: none; border: 1px solid var(--line); border-radius: 8px;
      cursor: pointer; font-size: 14px; padding: 4px 8px;
      transition: background .18s, border-color .18s;
      min-height: 30px; line-height: 1;
    }
    .btn-bookmark:hover { background: var(--gold-soft); border-color: var(--gold); }
    .btn-bookmark.bookmarked { background: var(--gold-soft); border-color: var(--gold); }

    /* ===== LIKE/DISLIKE TABS ===== */
    .ld-tabs { display: flex; gap: 0; margin-bottom: 14px; border-bottom: 2px solid var(--line-soft); }
    .ld-tab {
      padding: 8px 20px; font-size: 13px; font-weight: 700;
      cursor: pointer; border: none; background: none;
      font-family: inherit;
      color: var(--text-faint); border-bottom: 3px solid transparent; margin-bottom: -2px;
      transition: color .18s;
    }
    .ld-tab.active-like    { color: var(--vermilion); border-bottom-color: var(--vermilion); }
    .ld-tab.active-dislike { color: var(--indigo); border-bottom-color: var(--indigo); }
    .ld-tab.active         { color: var(--indigo); border-bottom-color: var(--indigo); }

    /* ===== GOAL BANNER ===== */
    .goal-banner {
      background: linear-gradient(120deg, var(--vermilion) 0%, var(--vermilion-deep) 70%, #93321f 100%);
      color: white;
      padding: 15px 20px;
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      flex-shrink: 0;
      letter-spacing: 2px;
      line-height: 1.45;
      cursor: pointer;
      transition: filter .2s;
      text-shadow: 0 1px 3px rgba(0,0,0,.18);
      box-shadow: inset 0 -1px 0 rgba(0,0,0,.15);
    }
    .goal-banner:hover { filter: brightness(1.07); }

    /* ===== MAXIM BANNER ===== */
    .maxim-banner {
      background: linear-gradient(120deg, var(--ink-900) 0%, var(--ink-700) 100%);
      color: rgba(255,255,255,0.85);
      padding: 8px 20px;
      font-family: var(--font-serif);
      font-size: 12.5px; font-style: italic;
      text-align: center; flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      letter-spacing: 1px; line-height: 1.55;
    }

    /* ===== EKOHIKI BANNER ===== */
    .ekohiki-banner {
      background: linear-gradient(120deg, #29435f 0%, var(--indigo) 100%);
      color: rgba(255,255,255,0.88);
      padding: 8px 20px;
      font-family: var(--font-serif);
      font-size: 12.5px; font-style: italic;
      text-align: center; flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      letter-spacing: 1px; line-height: 1.55;
    }

    /* ===== MEMO MODAL ===== */
    .memo-modal {
      position: fixed; inset: 0;
      background: rgba(17,22,29,0.66);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
    }
    .memo-modal-card {
      background: var(--surface); border-radius: 20px;
      padding: 24px; width: 92%; max-width: 570px;
      max-height: 88vh; overflow-y: auto;
      box-shadow: var(--shadow-pop);
      border-top: 4px solid var(--vermilion);
      animation: cardIn .3s cubic-bezier(.21,1.02,.55,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(14px) scale(.985); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .memo-modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 15px; padding-bottom: 11px;
      border-bottom: 1px solid var(--line-soft);
    }
    .memo-modal-header h3 {
      font-family: var(--font-serif);
      font-size: 16px; font-weight: 700; letter-spacing: 1.5px;
      color: var(--ink-800);
    }
    .btn-close-modal {
      background: none; border: none; cursor: pointer;
      font-size: 20px; color: var(--text-faint); line-height: 1; padding: 4px 6px;
      border-radius: 8px;
      transition: all .18s;
    }
    .btn-close-modal:hover { color: var(--text); background: var(--line-soft); }

    /* 罫線付きテキストエリア */
    .lined-textarea {
      width: 100%;
      border: 1px solid var(--line); border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px; font-family: inherit;
      line-height: 26px;
      min-height: 280px;
      resize: vertical;
      color: var(--text);
      background-color: var(--surface);
      background-image: repeating-linear-gradient(
        transparent, transparent 25px,
        var(--line-soft) 25px, var(--line-soft) 26px
      );
      background-size: 100% 26px;
      background-position: 0 8px;
      background-attachment: local;
      transition: border-color .2s, box-shadow .2s;
    }
    .lined-textarea:focus {
      outline: none; border-color: var(--indigo);
      box-shadow: 0 0 0 3px rgba(63,94,140,0.14);
    }

    /* Memo entries */
    .memo-entries-header { font-size: 12px; font-weight: 700; color: var(--text-soft); letter-spacing: .5px; margin: 15px 0 8px; }
    .memo-entry {
      border: 1px solid var(--line-soft); border-radius: 12px;
      background: white;
      padding: 10px 36px 10px 13px;
      margin-bottom: 8px; position: relative;
      transition: border-color .18s, box-shadow .18s;
    }
    .memo-entry:hover { border-color: var(--line); box-shadow: 0 3px 12px rgba(20,26,34,.06); }
    .memo-entry-date { font-size: 11px; color: var(--text-faint); margin-bottom: 4px; }
    .memo-entry-text { font-size: 13px; color: var(--text); white-space: pre-wrap; line-height: 1.65; word-break: break-word; }

    /* ===== LEARNING MODAL ===== */
    .learning-date-header {
      font-family: var(--font-serif);
      font-size: 13.5px; font-weight: 700; letter-spacing: 1px;
      color: var(--ink-800);
      border-bottom: 2px solid var(--ink-800);
      padding-bottom: 5px; margin: 16px 0 9px;
      position: relative;
    }
    .learning-date-header::after {
      content: '';
      position: absolute; left: 0; bottom: -2px;
      width: 42px; height: 2px; background: var(--vermilion);
    }
    .learning-date-header:first-child { margin-top: 0; }
    .learning-entry { border: 1px solid var(--line-soft); background: white; border-radius: 12px; padding: 10px 13px; margin-bottom: 8px; }
    .learning-entry-label { font-size: 11px; color: var(--text-soft); font-weight: 700; margin-bottom: 4px; }
    .learning-entry-text { font-size: 13px; color: var(--text); white-space: pre-wrap; line-height: 1.65; word-break: break-word; }
    .learning-entry.conceptualization {
      border: 1.5px solid var(--indigo);
      background: var(--indigo-soft);
      box-shadow: 0 2px 10px rgba(63,94,140,.09);
    }
    .learning-entry.conceptualization .learning-entry-label { color: var(--indigo-deep); }
    .btn-bookmark-learning {
      position: absolute; top: 8px; right: 10px;
      background: none; border: none; cursor: pointer;
      font-size: 16px; padding: 0 2px; line-height: 1;
      color: var(--gold); opacity: 0.55; transition: opacity .18s, transform .18s;
    }
    .btn-bookmark-learning:hover { opacity: 1; transform: scale(1.15); }
    .learning-filter-row {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 8px 0 6px; border-bottom: 1px solid var(--line-soft); margin-bottom: 9px;
    }
    .learning-filter-btn {
      padding: 4px 12px; border-radius: 20px; border: 1px solid var(--line);
      background: var(--paper-2); font-size: 12px; cursor: pointer; font-family: inherit;
      color: var(--text-soft); transition: all .18s;
    }
    .learning-filter-btn:hover { border-color: var(--indigo); color: var(--indigo); }
    .learning-filter-btn.active {
      background: var(--ink-800); color: #fff; border-color: var(--ink-800);
      box-shadow: 0 3px 8px rgba(20,26,34,.25);
    }
    .learning-filter-btn.active.cat-news     { background: var(--indigo); border-color: var(--indigo); }
    .learning-filter-btn.active.cat-bookclub { background: var(--green); border-color: var(--green); }
    .learning-filter-btn.active.cat-reading  { background: var(--gold); border-color: var(--gold); }
    .learning-filter-btn.active.cat-other    { background: #8a919d; border-color: #8a919d; }
    .learning-category-row {
      display: flex; align-items: center; gap: 8px;
      margin: 10px 0 5px; padding: 5px 0;
      border-top: 1px dashed var(--line);
    }
    .learning-category-row:first-child { border-top: none; margin-top: 0; }
    .learning-cat-select {
      flex: 1; font-size: 12px; padding: 4px 8px;
      border-radius: 8px; border: 1px solid var(--line);
      background: var(--paper-2); cursor: pointer; font-family: inherit;
      color: var(--text);
    }
    .learning-cat-select:focus { outline: none; border-color: var(--indigo); }
    .cat-badge-inline { font-size: 10px; padding: 1px 7px; white-space: nowrap; }
    .bookmark-entry-wrapper { margin-bottom: 13px; }
    .bookmark-entry-wrapper .learning-entry { margin-bottom: 4px; }
    .bookmark-entry-wrapper .learning-entry:last-child { margin-bottom: 0; }
    .bookmark-sub-field { background: var(--paper-2); border-color: var(--line-soft); margin-left: 14px; }
    .bookmark-sub-field .learning-entry-label { color: var(--text-soft); }
    .btn-delete-memo {
      position: absolute; top: 8px; right: 10px;
      background: none; border: none; cursor: pointer;
      font-size: 14px; color: #d3cec2; padding: 2px;
      transition: color .18s;
    }
    .btn-delete-memo:hover { color: var(--vermilion); }

    /* ===== RIGHT PANEL ===== */
    .right-panel {
      flex: 1; overflow-y: auto; padding: 18px;
      display: flex; flex-direction: column; gap: 15px;
    }

    /* ===== SECTIONS ===== */
    .panel-section {
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--line-soft);
      padding: 18px; box-shadow: var(--shadow-card);
    }
    .section-title {
      font-size: 13px; font-weight: 700; color: var(--ink-700);
      letter-spacing: .5px;
      margin-bottom: 13px; padding-bottom: 9px;
      border-bottom: 1px solid var(--line-soft);
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      position: relative;
    }
    .section-title::before {
      content: '';
      width: 4px; height: 15px; border-radius: 3px;
      background: linear-gradient(180deg, var(--vermilion), var(--gold));
      flex-shrink: 0;
    }
    .section-title .badge {
      font-size: 11px; background: var(--indigo); color: white;
      padding: 1px 8px; border-radius: 12px;
    }

    /* ===== SETUP BANNER ===== */
    .setup-banner {
      background: var(--gold-soft); border: 1px solid #ecd9ae;
      border-radius: var(--radius); padding: 15px 17px;
      font-size: 12px; color: var(--text); line-height: 1.7;
    }
    .setup-banner h4 { font-size: 13px; color: var(--gold); margin-bottom: 8px; font-weight: 700; }
    .setup-banner ol { padding-left: 18px; margin-top: 6px; }
    .setup-banner li { margin-bottom: 4px; }
    .setup-banner code { background: rgba(20,26,34,.06); padding: 1px 6px; border-radius: 4px; font-size: 11px; }

    /* ===== FORM ===== */
    .output-form { display: flex; flex-direction: column; gap: 11px; }
    .form-field { display: flex; flex-direction: column; gap: 5px; }
    .form-field label { font-size: 12px; font-weight: 700; color: var(--ink-700); }
    .form-field textarea {
      width: 100%; border: 1px solid var(--line); border-radius: 10px;
      padding: 9px 11px; font-size: 13px; resize: vertical;
      min-height: 56px; font-family: inherit; color: var(--text);
      background: white;
      transition: border-color .2s, box-shadow .2s; line-height: 1.55;
    }
    .form-field textarea:focus {
      outline: none; border-color: var(--indigo);
      box-shadow: 0 0 0 3px rgba(63,94,140,0.13);
    }
    .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
    .category-select-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .category-select-wrap label { font-size: 12px; font-weight: 700; color: var(--ink-700); white-space: nowrap; }
    .category-select {
      flex: 1; border: 1px solid var(--line); border-radius: 9px;
      padding: 6px 10px; font-size: 13px; font-family: inherit;
      background: white; cursor: pointer; color: var(--text);
    }
    .category-select:focus { outline: none; border-color: var(--indigo); box-shadow: 0 0 0 3px rgba(63,94,140,0.13); }
    .category-badge {
      display: inline-block; padding: 2px 9px; border-radius: 12px;
      font-size: 11px; font-weight: 700; color: #fff; margin-bottom: 6px;
      letter-spacing: .3px;
    }
    .cat-news        { background: var(--indigo); }
    .cat-bookclub    { background: var(--green); }
    .cat-reading     { background: var(--gold); }
    .cat-action-plan { background: #7d5ba6; }
    .cat-biz         { background: #ad4136; }
    .cat-other       { background: #8a919d; }
    .habit-form-grid { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
    .habit-form-row { display: flex; align-items: center; gap: 8px; }
    .habit-form-row label { font-size: 11px; color: var(--text-soft); font-weight: 700; width: 56px; flex-shrink: 0; }
    .habit-form-row input {
      flex: 1; border: 1px solid var(--line); border-radius: 9px; padding: 7px 9px;
      font-size: 13px; font-family: inherit; background: white; color: var(--text);
    }
    .habit-form-row input:focus { outline: none; border-color: var(--indigo); }
    .habit-entry { border: 1px solid var(--line-soft); background: white; border-radius: 12px; padding: 10px 84px 10px 28px; margin-bottom: 6px; position: relative; }
    .habit-entry.paused { opacity: 0.5; }
    .habit-badge.paused-badge { background: #fbe9d4; color: #c07322; }
    .habit-entry-row { display: flex; flex-direction: column; gap: 4px; }
    .habit-entry-item { display: flex; gap: 6px; align-items: baseline; }
    .habit-entry-cell { font-size: 13px; color: var(--text); }
    .habit-entry-cell-label { font-size: 10px; color: var(--text-faint); font-weight: 700; width: 56px; flex-shrink: 0; }
    .habit-entry-meta { display: flex; gap: 5px; margin-top: 4px; flex-wrap: wrap; }
    .habit-badge { font-size: 10px; border-radius: 5px; padding: 1px 7px; }
    .habit-badge.daily    { background: var(--green-soft); color: var(--green); }
    .habit-badge.weekdays { background: var(--indigo-soft); color: var(--indigo); }
    .habit-order-btns { position: absolute; left: 4px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 0; }
    .habit-order-btn { background: none; border: none; color: #d3cec2; font-size: 10px; cursor: pointer; padding: 1px 3px; line-height: 1.2; transition: color .18s; }
    .habit-order-btn:hover { color: var(--indigo); }
    .habit-schedule-opts { display: flex; gap: 12px; }
    .habit-schedule-opts label { font-size: 12px; color: var(--text); font-weight: 400; width: auto; cursor: pointer; display: flex; align-items: center; gap: 3px; }
    .habit-weekdays-wrap { display: flex; gap: 4px; flex-wrap: wrap; }
    .habit-weekdays-wrap label { font-size: 12px; color: var(--text); font-weight: 400; width: auto; cursor: pointer; background: var(--paper-2); border-radius: 6px; padding: 2px 8px; display: flex; align-items: center; gap: 2px; border: 1px solid var(--line); transition: all .15s; }
    .habit-weekdays-wrap label:has(input:checked) { background: var(--indigo-soft); color: var(--indigo); border-color: #b8cbe2; }
    .habit-edit-form { margin-top: 6px; display: flex; flex-direction: column; gap: 5px; }
    .habit-edit-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 2px; }
    .memo-entry-edit-area { margin: 4px 0 6px; }
    .memo-entry-edit-area textarea { width: 100%; border: 1.5px solid var(--indigo); border-radius: 9px; padding: 7px 9px; font-size: 13px; font-family: inherit; resize: vertical; color: var(--text); }
    .memo-edit-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 4px; }

    /* ===== BUTTONS ===== */
    .btn {
      padding: 8px 18px; border: none; border-radius: 10px;
      cursor: pointer; font-size: 12px; font-weight: 700;
      font-family: inherit;
      letter-spacing: .3px;
      transition: all .18s; min-height: 36px;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.06); }
    .btn:active { transform: translateY(0); }
    .btn-primary   { background: linear-gradient(135deg, var(--indigo), var(--indigo-deep)); color: white; box-shadow: 0 3px 10px rgba(63,94,140,.3); }
    .btn-secondary { background: #edeae0; color: var(--text); }
    .btn-warning   { background: linear-gradient(135deg, #c9962b, var(--gold)); color: white; box-shadow: 0 3px 10px rgba(185,132,41,.3); }
    .btn-danger    { background: linear-gradient(135deg, #c34f3c, var(--vermilion-deep)); color: white; box-shadow: 0 3px 10px rgba(195,79,60,.3); }
    .btn-sm { padding: 5px 12px; font-size: 11px; min-height: 30px; }

    /* ===== OUTPUT ENTRIES ===== */
    .output-entry {
      border: 1px solid var(--line-soft); border-radius: 13px;
      background: white;
      padding: 13px 15px; margin-bottom: 10px;
      transition: border-color .2s, box-shadow .2s;
    }
    .output-entry:last-child { margin-bottom: 0; }
    .output-entry:hover { border-color: #cfd8e3; box-shadow: 0 4px 16px rgba(20,26,34,.06); }
    .output-entry-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 10px;
    }
    .entry-num {
      font-size: 12px; font-weight: 700; color: var(--indigo);
      background: var(--indigo-soft); padding: 2px 9px; border-radius: 12px;
    }
    .entry-actions { display: flex; gap: 6px; }
    .field-view { display: flex; flex-direction: column; gap: 9px; }
    .field-item  { display: flex; flex-direction: column; gap: 2px; }
    .field-label { font-size: 11px; font-weight: 700; color: var(--text-soft); }
    .field-value { font-size: 13px; color: var(--text); white-space: pre-wrap; line-height: 1.6; word-break: break-word; }

    /* ===== SUMMARY ===== */
    .summary-content { font-size: 13px; color: var(--text); }
    .summary-stat { font-size: 12px; color: var(--text-soft); margin-bottom: 10px; font-weight: 600; }
    .summary-date-group { margin-bottom: 10px; }
    .summary-date-label { font-size: 12px; font-weight: 700; color: var(--ink-800); margin-bottom: 4px; }
    .summary-item {
      background: var(--paper-2); border: 1px solid var(--line-soft); border-left: 3px solid var(--indigo);
      border-radius: 3px 8px 8px 3px; padding: 7px 11px;
      margin-bottom: 4px; font-size: 12px; line-height: 1.55;
    }
    .summary-item strong { color: var(--indigo); }
    .summary-item .s-row { color: var(--text); }
    .summary-item .s-label { color: var(--text-soft); font-weight: 700; }

    .empty-message { color: var(--text-faint); font-size: 13px; text-align: center; padding: 18px 0; }
    .no-date-message {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 200px; color: var(--text-faint); gap: 8px;
    }
    .no-date-message p { font-size: 14px; }

    /* ===== RELOAD WARNING MODAL ===== */
    .reload-modal-card {
      background: var(--surface); border-radius: 20px;
      padding: 30px 28px 24px; width: 92%; max-width: 400px;
      box-shadow: var(--shadow-pop); text-align: center;
      border-top: 4px solid var(--gold);
      animation: cardIn .3s cubic-bezier(.21,1.02,.55,1) both;
    }
    .reload-modal-icon { font-size: 36px; margin-bottom: 12px; }
    .reload-modal-title { font-family: var(--font-serif); font-size: 17px; font-weight: 700; letter-spacing: 1px; color: var(--ink-800); margin-bottom: 8px; }
    .reload-modal-desc  { font-size: 13px; color: var(--text-soft); line-height: 1.7; margin-bottom: 20px; }
    .reload-modal-actions { display: flex; gap: 10px; justify-content: center; }

    /* ===== UNRECORDED FIELDS ===== */
    #unrecordedSection {
      padding: 11px 16px;
      background: var(--vermilion-soft);
      border-top: 2px solid var(--vermilion);
      border-bottom: 1px solid #eccdc5;
    }
    .unrecorded-title {
      font-size: 11px; font-weight: 700; color: var(--vermilion);
      letter-spacing: .5px;
      margin-bottom: 7px; display: flex; align-items: center; gap: 4px;
    }
    .unrecorded-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .unrecorded-tag {
      font-size: 11px; color: var(--vermilion-deep); background: white;
      border: 1px solid #ecc4ba; border-radius: 12px;
      padding: 2px 10px; font-weight: 600;
    }

    /* ===== GOAL SECTION IN SUMMARY ===== */
    .goal-section {
      background: var(--gold-soft); border: 1px solid #ecd9ae;
      border-left: 3px solid var(--gold); border-radius: 3px 9px 9px 3px;
      padding: 8px 11px; margin-bottom: 8px;
      cursor: pointer; transition: box-shadow .18s;
    }
    .goal-section:hover { box-shadow: 0 3px 12px rgba(185,132,41,.16); }
    .goal-section-label {
      font-size: 10px; font-weight: 700; color: var(--gold);
      letter-spacing: .5px;
      margin-bottom: 3px; display: flex; align-items: center; gap: 4px;
    }
    .goal-section-text { font-size: 12px; color: var(--text); line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
    .goal-section-empty { font-size: 11px; color: var(--text-faint); font-style: italic; }

    /* ===== GOAL MODAL SECTIONS ===== */
    .goal-modal-section { margin-bottom: 17px; }
    .goal-modal-section-title {
      font-size: 12px; font-weight: 700; color: var(--ink-700);
      margin-bottom: 7px; padding-bottom: 5px;
      border-bottom: 1px solid var(--line-soft);
      display: flex; align-items: center; gap: 6px;
    }
    .goal-modal-section-title span { font-size: 10px; color: var(--text-soft); font-weight: 400; }
    .goal-modal-textarea {
      width: 100%; border: 1px solid var(--line); border-radius: 10px;
      padding: 9px 11px; font-size: 13px; font-family: inherit;
      background: white; color: var(--text);
      resize: vertical; min-height: 72px; line-height: 1.55;
      transition: border-color .2s, box-shadow .2s;
    }
    .goal-modal-textarea:focus {
      outline: none; border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(185,132,41,0.14);
    }


    /* ===== URL LINKS ===== */
    .url-link { color: var(--indigo); text-decoration: underline; text-underline-offset: 2px; cursor: pointer; word-break: break-all; }
    .url-link:hover { color: var(--indigo-deep); }

    /* ===== MOBILE ===== */
    @media (max-width: 767px) {
      body { overflow-y: auto; height: auto; min-height: 100vh; }
      .app-container { flex-direction: column; overflow: visible; height: auto; }
      .left-panel {
        width: 100%; min-width: unset;
        border-right: none; border-bottom: 1px solid var(--line); overflow-y: visible;
      }
      .left-extra { display: none; }
      .right-panel { overflow-y: visible; padding: 12px; }

      .cal-day { min-height: 44px; }
      .day-num { width: 30px; height: 30px; font-size: 13px; }
      .cal-nav-btn { min-width: 40px; min-height: 40px; font-size: 18px; }
      .calendar-container { padding: 12px; }
      .panel-section { padding: 13px; }

      header { padding: 10px 14px; }
      header h1 { font-size: 14px; letter-spacing: 2px; }
      .user-email { display: none; }

      .login-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>

<!-- Reload Warning Modal -->
<div class="memo-modal" id="reloadWarningModal" style="display:none;">
  <div class="reload-modal-card">
    <div class="reload-modal-icon">⚠️</div>
    <div class="reload-modal-title">入力中の内容があります</div>
    <div class="reload-modal-desc">リロードすると入力中の内容が消えます。<br>本当にリロードしますか？</div>
    <div class="reload-modal-actions">
      <button class="btn btn-secondary" onclick="closeReloadWarning()">キャンセル</button>
      <button class="btn btn-danger"    onclick="confirmReload()">リロード</button>
    </div>
  </div>
</div>

<!-- Bookmark Modal -->
<div class="memo-modal" id="bookmarkModal" style="display:none;">
  <div class="memo-modal-card">
    <div class="memo-modal-header">
      <h3>⭐ ブックマーク</h3>
      <button class="btn-close-modal" onclick="closeBookmarkModal()">&#x2715;</button>
    </div>
    <div class="learning-filter-row" id="bookmarkFilterRow"></div>
    <div id="bookmarkList"></div>
  </div>
</div>

<!-- Like/Dislike Modal -->
<div class="memo-modal" id="likedislikeModal" style="display:none;">
  <div class="memo-modal-card">
    <div class="memo-modal-header">
      <h3>好き / 嫌い メモ</h3>
      <button class="btn-close-modal" onclick="closeLikeDislikeModal()">&#x2715;</button>
    </div>
    <div class="ld-tabs">
      <button class="ld-tab" id="tab-like"    onclick="switchLDTab('like')">❤️ 好きなこと</button>
      <button class="ld-tab" id="tab-dislike" onclick="switchLDTab('dislike')">💙 嫌いなこと</button>
    </div>
    <textarea class="lined-textarea" id="ldInput" placeholder="" style="min-height:120px;"></textarea>
    <div class="form-actions" style="margin-top:10px;">
      <button class="btn btn-secondary" onclick="closeLikeDislikeModal()">キャンセル</button>
      <button class="btn btn-primary" id="ldSaveBtn" onclick="saveLDEntry()">保存</button>
    </div>
    <div id="ldEntriesList"></div>
  </div>
</div>

<!-- Learning Modal -->
<div class="memo-modal" id="learningModal" style="display:none;">
  <div class="memo-modal-card">
    <div class="memo-modal-header">
      <h3>学びの一覧</h3>
      <button class="btn-close-modal" onclick="closeLearningModal()">&#x2715;</button>
    </div>
    <div class="learning-filter-row" id="learningFilterRow"></div>
    <div id="learningList"></div>
  </div>
</div>

<!-- Goal Modal -->
<div class="memo-modal" id="goalModal" style="display:none;">
  <div class="memo-modal-card">
    <div class="memo-modal-header">
      <h3>目標管理</h3>
      <button class="btn-close-modal" onclick="closeGoalModal()">&#x2715;</button>
    </div>
    <div class="goal-modal-section">
      <div class="goal-modal-section-title">🎯 全体目標</div>
      <textarea class="goal-modal-textarea" id="goalInput" placeholder="全体的な目標を入力してください..."></textarea>
    </div>
    <div class="goal-modal-section">
      <div class="goal-modal-section-title">📅 今月の目標 <span id="goalMonthLabel"></span></div>
      <textarea class="goal-modal-textarea" id="goalMonthInput" placeholder="今月の目標を入力してください..."></textarea>
    </div>
    <div class="goal-modal-section">
      <div class="goal-modal-section-title">📆 今週の目標 <span id="goalWeekLabel"></span></div>
      <textarea class="goal-modal-textarea" id="goalWeekInput" placeholder="今週の目標を入力してください..."></textarea>
    </div>
    <div class="form-actions" style="margin-top:4px;">
      <button class="btn btn-secondary" onclick="closeGoalModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveGoal()" style="background:#e67e22;">保存</button>
    </div>
  </div>
</div>

<!-- Memo Modal -->
<div class="memo-modal" id="memoModal" style="display:none;">
  <div class="memo-modal-card">
    <div class="memo-modal-header">
      <h3 id="memoModalTitle"></h3>
      <button class="btn-close-modal" onclick="closeMemoModal()">&#x2715;</button>
    </div>
    <!-- アイデアメモ用タブ（格言メモでは非表示） -->
    <div class="ld-tabs" id="memoTabsRow" style="display:none;">
      <button class="ld-tab" id="tab-idea-memo"    onclick="switchIdeaTab('idea')">💡 アイデアメモ</button>
      <button class="ld-tab" id="tab-ekohiki-memo" onclick="switchIdeaTab('ekohiki')">📖 えこひいき</button>
      <button class="ld-tab" id="tab-habit-memo"   onclick="switchIdeaTab('habit')">📋 習慣・タスク</button>
    </div>
    <!-- アイデア入力エリア -->
    <div id="memoIdeaSection">
      <textarea class="lined-textarea" id="memoInput" placeholder=""></textarea>
      <div class="form-actions" style="margin-top:10px;">
        <button class="btn btn-secondary" onclick="closeMemoModal()">キャンセル</button>
        <button class="btn btn-primary" onclick="saveMemoEntry()">保存</button>
      </div>
      <div id="memoEntriesList"></div>
    </div>
    <!-- 習慣・タスク入力エリア -->
    <div id="memoHabitSection" style="display:none;">
      <div class="habit-form-grid">
        <div class="habit-form-row"><label>時間</label><input type="text" id="habitTime" placeholder="例）朝7時"></div>
        <div class="habit-form-row"><label>習慣内容</label><input type="text" id="habitContent" placeholder="習慣・タスク内容"></div>
        <div class="habit-form-row"><label>目的</label><input type="text" id="habitPurpose" placeholder="目的・理由"></div>
        <div class="habit-form-row">
          <label>頻度</label>
          <div class="habit-schedule-opts">
            <label><input type="radio" name="habitSchedule" value="daily" checked onchange="toggleHabitWeekdays()"> 毎日</label>
            <label><input type="radio" name="habitSchedule" value="weekdays" onchange="toggleHabitWeekdays()"> 曜日指定</label>
          </div>
        </div>
        <div class="habit-form-row" id="habitWeekdaysRow" style="display:none;">
          <label>曜日</label>
          <div class="habit-weekdays-wrap">
            <label><input type="checkbox" class="habit-dow" value="1"> 月</label>
            <label><input type="checkbox" class="habit-dow" value="2"> 火</label>
            <label><input type="checkbox" class="habit-dow" value="3"> 水</label>
            <label><input type="checkbox" class="habit-dow" value="4"> 木</label>
            <label><input type="checkbox" class="habit-dow" value="5"> 金</label>
            <label><input type="checkbox" class="habit-dow" value="6"> 土</label>
            <label><input type="checkbox" class="habit-dow" value="0"> 日</label>
          </div>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveHabitEntry()">追加</button>
      </div>
      <div id="habitEntriesList"></div>
    </div>
  </div>
</div>

<!-- Login Overlay -->

<script>
  // ============================================================
  //  FIREBASE CONFIG
  //  Firebaseコンソール → プロジェクト設定 → ウェブアプリ
  //  の「firebaseConfig」をそのまま貼り付けてください
  // ============================================================
  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyBw_Xg_La8vRVAHYGfQLLMBJx4HeLEUyOs",
    authDomain:        "daily-output-40eba.firebaseapp.com",
    projectId:         "daily-output-40eba",
    storageBucket:     "daily-output-40eba.firebasestorage.app",
    messagingSenderId: "751865136950",
    appId:             "1:751865136950:web:a1b723b1bbc737d46ad597"
  };
  // ============================================================

  const VERSION    = 'v2.7.0';


  const FIELD_DEFS = [
    { key: 'experience',        label: '① 経験' },
    { key: 'reflection',        label: '② 振り返り', tall: true },
    { key: 'conceptualization', label: '③ 概念化（他の状況への応用・学び）' },
    { key: 'practice',          label: '④ 実践' },
    { key: 'concrete_abstract', label: '⑤ 具体→抽象→具体（学びを抽象的にとらえて別場面で応用）' },
    { key: 'whywhy',            label: '⑥ なぜなぜ分析（課題に対して根本的な原因を見つける）' },
    { key: 'tgt',               label: '⑦ TGT（Three Good Things）（ポジティブな気持ちや幸福感に繋げる）' },
    { key: 'flexible_mind',     label: '⑧ しなやかマインドセット（しなやかマインドを定着させる）' },
    { key: 'habit_review',      label: '⑨ 今日の習慣の振り返り（できたこと、できなかったこと、理由を振り返る）' },
    { key: 'notes',             label: '⑩ その他メモ', tall: true },
    { key: 'tomorrow_todo',     label: '⑪ 明日のToDo' },
  ];

  // --- State ---
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  let currentYear    = today.getFullYear();
  let currentMonth   = today.getMonth();
  let selectedDate   = null;
  let localData      = {};
  let db             = null;
  let currentUser    = null;
  let isFirebaseMode = false;
  let appInitialized = false;
  let initializedUid = null;

  // ===== UTILITIES =====
  function formatDate(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function todayStr() { return formatDate(today); }
  function formatDateJP(s) {
    const [y,m,d] = s.split('-');
    return `${y}年${parseInt(m)}月${parseInt(d)}日`;
  }
  function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2,6); }
  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }
  function trunc(s, n) { return (!s||s.length<=n) ? (s||'') : s.substring(0,n)+'…'; }
  // Ctrl+クリックでURLを開く（通常クリックは無効）
  function linkifyText(s) {
    if (!s) return '';
    return escHtml(s).replace(/(https?:\/\/[^\s<>"&]+)/g, url =>
      `<a href="${url}" target="_blank" class="url-link" onclick="if(!event.ctrlKey){event.preventDefault()}">${url}</a>`
    );
  }
  function offsetDate(s, days) {
    const d = new Date(s); d.setDate(d.getDate()+days); return formatDate(d);
  }
  function isMobile() { return window.innerWidth < 768; }

  // ===== FIREBASE / AUTH =====
  function isFirebaseConfigured() {
    return FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey !== 'YOUR_API_KEY';
  }

  function initStorage() {
    if (isFirebaseConfigured()) {
      firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.firestore();

      // Auth状態の監視
      firebase.auth().onAuthStateChanged(user => {
        currentUser = user;
        if (user) {
          // ログイン済み
          document.getElementById('loginOverlay').style.display = 'none';
          showUserInfo(user);
          isFirebaseMode = true;
          const badge = document.getElementById('storageBadge');
          badge.textContent = 'Firebase';
          badge.className = 'storage-badge firebase';
          // 初回、またはユーザーが変わったときだけデータ読込＋初期化する。
          // トークン自動更新などによる再発火では再描画しない（入力中の内容を保持）。
          if (!appInitialized || initializedUid !== user.uid) {
            initializedUid = user.uid;
            appInitialized = true;
            loadFirestoreData().then(() => init());
          }
        } else {
          // 未ログイン → ログイン画面を表示
          document.getElementById('loginOverlay').style.display = 'flex';
          document.getElementById('userInfo').style.display = 'none';
          localData = {};
          appInitialized = false;
          initializedUid = null;
        }
      });
    } else {
      // Firebase未設定 → localStorageで動作
      loadFromLocal();
      init();
    }
  }

  function showUserInfo(user) {
    const info = document.getElementById('userInfo');
    const avatar = document.getElementById('userAvatar');
    const email = document.getElementById('userEmail');
    if (user.photoURL) { avatar.src = user.photoURL; avatar.style.display = ''; }
    else               { avatar.style.display = 'none'; }
    email.textContent = user.email || user.displayName || '';
    info.style.display = 'flex';
  }

  function useLocalMode() {
    document.getElementById('loginOverlay').style.display = 'none';
    loadFromLocal();
    init();
  }

  function signInWithGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider).catch(e => {
      alert('ログインに失敗しました: ' + e.message);
    });
  }

  function signOutUser() {
    if (!confirm('ログアウトしますか？')) return;
    firebase.auth().signOut();
  }

  // ===== DATA LAYER =====
  // Firestoreのパス: users/{uid}/outputs/{dateStr}
  function userOutputsRef() {
    return db.collection('users').doc(currentUser.uid).collection('outputs');
  }

  async function loadFirestoreData() {
    try {
      const snapshot = await userOutputsRef().get();
      localData = {};
      snapshot.forEach(doc => { localData[doc.id] = doc.data().entries || []; });
      await loadMemosFromFirestore();
      await loadChecksFromFirestore();
    } catch (e) {
      console.error('データ読み込みエラー:', e);
      alert('データの読み込みに失敗しました: ' + e.message);
    }
  }

  function loadFromLocal() {
    try { localData = JSON.parse(localStorage.getItem('outputData') || '{}'); }
    catch { localData = {}; }
    loadMemosFromLocal();
    loadChecksFromLocal();
  }

  function loadData() { return localData; }

  async function saveDataForDate(dateStr, entries) {
    if (entries.length === 0) { delete localData[dateStr]; }
    else { localData[dateStr] = entries; }

    if (isFirebaseMode && db && currentUser) {
      try {
        if (entries.length === 0) {
          await userOutputsRef().doc(dateStr).delete();
        } else {
          await userOutputsRef().doc(dateStr).set({ entries });
        }
      } catch (e) {
        console.error('保存エラー:', e);
        alert('Firebaseへの保存に失敗しました:\n' + e.message);
      }
    } else {
      localStorage.setItem('outputData', JSON.stringify(localData));
    }
  }

  // ===== INIT =====
  function cleanupOldChecks() {
    const currentMonth = todayStr().slice(0, 7); // 'YYYY-MM'
    // localStorage
    const toDelete = [];
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (!key) continue;
      if (key.startsWith('todoChecks_') && key.slice(11, 18) < currentMonth) toDelete.push(key);
      else if (key.startsWith('goalChecks_week_') && key.slice(16, 23) < currentMonth) toDelete.push(key);
      else if (key.startsWith('goalChecks_month_') && key.slice(17) < currentMonth) toDelete.push(key);
    }
    toDelete.forEach(k => localStorage.removeItem(k));
    // checksData（メモリ上）
    Object.keys(checksData.todoChecks).forEach(k => { if (k.slice(0, 7) < currentMonth) delete checksData.todoChecks[k]; });
    Object.keys(checksData.goalChecks).forEach(k => {
      const m = k.startsWith('week_') ? k.slice(5, 12) : k.startsWith('month_') ? k.slice(6) : null;
      if (m && m < currentMonth) delete checksData.goalChecks[k];
    });
  }

  function init() {
    cleanupOldChecks();
    updateMaximBanner();
    updateEkohikiBanner();
    updateGoalBanner();
    renderCalendar();
    selectDate(todayStr());
  }

  // ===== CALENDAR =====
  function renderCalendar() {
    const data = loadData();
    const withOutput = new Set(Object.keys(data).filter(k => (data[k]||[]).length > 0));
    document.getElementById('calTitle').textContent = `${currentYear}年${currentMonth+1}月`;

    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';

    [
      {label:'月',cls:''},{label:'火',cls:''},{label:'水',cls:''},
      {label:'木',cls:''},{label:'金',cls:''},
      {label:'土',cls:'sat'},{label:'日',cls:'sun'},
    ].forEach(({label,cls}) => {
      const h = document.createElement('div');
      h.className = 'cal-header'+(cls?' '+cls:'');
      h.textContent = label;
      grid.appendChild(h);
    });

    const firstDow = (new Date(currentYear, currentMonth, 1).getDay()+6)%7;
    const lastDate = new Date(currentYear, currentMonth+1, 0).getDate();
    const prevLast = new Date(currentYear, currentMonth, 0).getDate();

    for (let i=firstDow-1; i>=0; i--) {
      const el = document.createElement('div');
      el.className = 'cal-day other-month';
      el.innerHTML = `<span class="day-num">${prevLast-i}</span>`;
      grid.appendChild(el);
    }
    for (let d=1; d<=lastDate; d++) {
      const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const el = document.createElement('div');
      el.className = 'cal-day'
        +(dateStr===todayStr()   ?' today':'')
        +(dateStr===selectedDate ?' selected':'');
      el.innerHTML = `<span class="day-num">${d}</span>`
        +(withOutput.has(dateStr)?`<span class="output-dot"></span>`:'');
      el.addEventListener('click', () => requestSelectDate(dateStr));
      grid.appendChild(el);
    }
    const rem = (firstDow+lastDate)%7===0 ? 0 : 7-((firstDow+lastDate)%7);
    for (let i=1; i<=rem; i++) {
      const el = document.createElement('div');
      el.className = 'cal-day other-month';
      el.innerHTML = `<span class="day-num">${i}</span>`;
      grid.appendChild(el);
    }
  }

  // カレンダークリック経由の日付切替。入力中は確認してから移動する。
  function requestSelectDate(dateStr) {
    if (dateStr === selectedDate) return;
    if (hasUnsavedInput()) {
      if (!confirm('入力中の内容があります。保存せずに他の日付へ移動しますか？\n（入力内容は下書きとして残ります）')) return;
    }
    selectDate(dateStr);
  }

  function selectDate(dateStr) {
    selectedDate = dateStr;
    renderCalendar();
    renderLeftPanel();
    renderRightPanel();
  }

  // ===== LEFT PANEL EXTRA =====
  function renderUnrecordedSection() {
    const sec = document.getElementById('unrecordedSection');
    if (!sec || !selectedDate) { if(sec) sec.style.display='none'; return; }
    const data = loadData();
    const outputs = data[selectedDate] || [];
    const recordedKeys = new Set(outputs.flatMap(o => FIELD_DEFS.filter(f=>o[f.key]).map(f=>f.key)));
    const unrecorded = FIELD_DEFS.filter(f => !recordedKeys.has(f.key));
    if (unrecorded.length === 0) { sec.style.display='none'; return; }
    sec.style.display = 'block';
    sec.innerHTML = `
      <div class="unrecorded-title">📋 未記録の項目</div>
      <div class="unrecorded-tags">
        ${unrecorded.map(f=>`<span class="unrecorded-tag">${escHtml(f.label.replace(/（[^）]*）/g,'').trim())}</span>`).join('')}
      </div>`;
  }

  function renderLeftPanel() {
    renderUnrecordedSection();
    const extra = document.getElementById('leftExtra');
    extra.innerHTML = '';
    if (!selectedDate || isMobile()) return;
    const data = loadData();
    appendTodoPrevDay(extra, data);
    extra.appendChild(buildMonthSummaryLeft(data));
    extra.appendChild(buildWeekSummaryLeft(data));
  }

  // ===== CHECK STATE (デバイス間同期) =====
  let checksData = { todoChecks: {}, goalChecks: {} };

  function loadChecksFromLocal() {
    try {
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key) continue;
        if (key.startsWith('todoChecks_'))
          checksData.todoChecks[key.slice(11)] = JSON.parse(localStorage.getItem(key) || '{}');
        else if (key.startsWith('goalChecks_'))
          checksData.goalChecks[key.slice(11)] = JSON.parse(localStorage.getItem(key) || '{}');
      }
    } catch(e) {}
  }

  async function loadChecksFromFirestore() {
    try {
      const ref = db.collection('users').doc(currentUser.uid).collection('memos');
      const doc = await ref.doc('checks').get();
      if (doc.exists) {
        const parsed = JSON.parse(doc.data().data || '{}');
        checksData.todoChecks = parsed.todoChecks || {};
        checksData.goalChecks = parsed.goalChecks || {};
      }
    } catch(e) { console.error('checks load error:', e); }
  }

  async function saveChecks() {
    if (isFirebaseMode && db && currentUser) {
      try {
        const ref = db.collection('users').doc(currentUser.uid).collection('memos');
        await ref.doc('checks').set({ data: JSON.stringify(checksData) });
      } catch(e) { console.error('checks save error:', e); }
    }
    // localStorageにも常に保存
    Object.entries(checksData.todoChecks).forEach(([k, v]) => localStorage.setItem(`todoChecks_${k}`, JSON.stringify(v)));
    Object.entries(checksData.goalChecks).forEach(([k, v]) => localStorage.setItem(`goalChecks_${k}`, JSON.stringify(v)));
  }

  function loadTodoChecks(dateStr) {
    return checksData.todoChecks[dateStr] || {};
  }
  async function saveTodoCheck(dateStr, text, checked) {
    if (!checksData.todoChecks[dateStr]) checksData.todoChecks[dateStr] = {};
    checksData.todoChecks[dateStr][text] = checked;
    await saveChecks();
  }
  function loadGoalChecks(storageKey) {
    return checksData.goalChecks[storageKey] || {};
  }
  async function saveGoalCheck(storageKey, text, checked) {
    if (!checksData.goalChecks[storageKey]) checksData.goalChecks[storageKey] = {};
    checksData.goalChecks[storageKey][text] = checked;
    await saveChecks();
  }

  function calcTodoRateForDate(dateStr) {
    const data = loadData();
    const checks = loadTodoChecks(dateStr);
    const dayDow = new Date(dateStr).getDay();
    const habitItems = (memoData.habits || []).filter(h =>
      !h.paused && (!h.schedule || h.schedule === 'daily'
        ? true : (h.weekdays || []).includes(dayDow))
    );
    const prev = offsetDate(dateStr, -1);
    const todoLines = (data[prev]||[]).flatMap(o =>
      (o.tomorrow_todo||'').split('\n').map(l=>l.trim()).filter(l=>l)
    );
    const allKeys = [...habitItems.map(h => `habit:${h.id}`), ...todoLines];
    return { total: allKeys.length, done: allKeys.filter(k => !!checks[k]).length };
  }

  function calcTodoRateForRange(startStr, endStr) {
    const cap = endStr < selectedDate ? endStr : selectedDate;
    let total = 0, done = 0, d = startStr;
    while (d <= cap) {
      const r = calcTodoRateForDate(d);
      total += r.total; done += r.done;
      d = offsetDate(d, 1);
    }
    return { total, done };
  }

  function appendTodoPrevDay(container, data) {
    const prev = offsetDate(selectedDate, -1);
    const todoLines = (data[prev]||[]).flatMap(o =>
      (o.tomorrow_todo||'').split('\n').map(l=>l.trim()).filter(l=>l)
    );

    // 今日の曜日に該当する習慣を抽出（配列順 = 優先順位）
    const todayDow = new Date(selectedDate).getDay();
    const habitItems = (memoData.habits || []).filter(h =>
      !h.paused && (
        !h.schedule || h.schedule === 'daily'
          ? true
          : (h.weekdays || []).includes(todayDow)
      )
    );

    if (!habitItems.length && !todoLines.length) return;
    const checks = loadTodoChecks(selectedDate);
    const sec = document.createElement('div');
    sec.className = 'left-section';
    const title = document.createElement('div');
    title.className = 'left-section-title';
    title.textContent = '今日のToDo';

    // 達成率バッジ（チェック変更時も即時更新）
    const allKeys = [...habitItems.map(h => `habit:${h.id}`), ...todoLines];
    const totalCount = allKeys.length;
    const rateEl = document.createElement('span');
    rateEl.id = 'todayTodoRate';
    rateEl.style.cssText = 'font-size:11px;font-weight:600;color:#27ae60;background:#e8f8f5;border-radius:3px;padding:1px 5px;margin-left:4px;';
    rateEl.textContent = `${allKeys.filter(k => !!checks[k]).length}/${totalCount}`;
    title.appendChild(rateEl);
    sec.appendChild(title);

    function refreshTodoRate() {
      const el = document.getElementById('todayTodoRate');
      if (!el) return;
      const s = el.closest('.left-section');
      const cbs = s ? [...s.querySelectorAll('input[type="checkbox"]')] : [];
      el.textContent = `${cbs.filter(c=>c.checked).length}/${cbs.length}`;
    }

    // 習慣・タスク（優先順位順）
    habitItems.forEach(h => {
      const label = document.createElement('label');
      label.className = 'todo-item';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      const key = `habit:${h.id}`;
      cb.checked = !!checks[key];
      cb.addEventListener('change', () => { saveTodoCheck(selectedDate, key, cb.checked); refreshTodoRate(); });
      const span = document.createElement('span');
      span.className = 'todo-item-text';
      span.innerHTML = (h.time ? `<span style="color:#aaa;font-size:10px;margin-right:5px;">${escHtml(h.time)}</span>` : '') + escHtml(h.content);
      label.appendChild(cb);
      label.appendChild(span);
      sec.appendChild(label);
    });

    // 明日のToDoより（下部に区切り線付きで表示）
    if (todoLines.length) {
      if (habitItems.length) {
        const sep = document.createElement('div');
        sep.style.cssText = 'border-top:1px dashed #e8e8e8;margin:5px 0 3px;';
        sec.appendChild(sep);
        const lbl = document.createElement('div');

  function buildWeekSummaryLeft(data) {
    const wKey = getWeekKey(selectedDate);
    const wGoal = memoData.weeklyGoals[wKey] || '';
    const sel=new Date(selectedDate), dow=(sel.getDay()+6)%7;
    const mon=new Date(sel); mon.setDate(sel.getDate()-dow);
    const sun=new Date(mon); sun.setDate(mon.getDate()+6);
    const monStr=formatDate(mon), sunStr=formatDate(sun);
    const [,mm,md]=monStr.split('-'), [,sm,sd]=sunStr.split('-');
    const { total, done } = calcTodoRateForRange(monStr, sunStr);
    const ratePart = total > 0 ? `　${done}/${total}` : '';
    const wrap = document.createElement('div');
    buildGoalChecklist(wrap, wGoal, `week_${wKey}`, '📆 今週の目標', `${parseInt(mm)}/${parseInt(md)}〜${parseInt(sm)}/${parseInt(sd)}${ratePart}`);
    return wrap.firstChild;
  }

  function buildMonthSummaryLeft(data) {
    const mKey = getMonthKey(selectedDate);
    const mGoal = memoData.monthlyGoals[mKey] || '';
    const sel = new Date(selectedDate);
    const wrap = document.createElement('div');
    buildGoalChecklist(wrap, mGoal, `month_${mKey}`, '📅 今月の目標', `${sel.getFullYear()}年${sel.getMonth()+1}月`);

    const sec = wrap.firstChild;
    const titleEl = sec.querySelector('.left-section-title');
    const [y, m] = mKey.split('-').map(Number);
    const firstOfMonth = `${mKey}-01`;
    const lastOfMonth = `${mKey}-${String(new Date(y, m, 0).getDate()).padStart(2,'0')}`;
    const firstMonday = getWeekKey(firstOfMonth);
    const rateItems = [];
    let weekNum = 1, monStr = firstMonday;

    while (true) {
      const sunStr = offsetDate(monStr, 6);
      const effectiveStart = monStr < firstOfMonth ? firstOfMonth : monStr;
      const effectiveEnd   = sunStr > lastOfMonth  ? lastOfMonth  : sunStr;
      if (effectiveStart > lastOfMonth) break;
      if (effectiveStart > selectedDate) break;
      const { total, done } = calcTodoRateForRange(effectiveStart, effectiveEnd);
      if (total > 0) rateItems.push({ week: weekNum, done, total });
      weekNum++;
      monStr = offsetDate(monStr, 7);
    }

    if (rateItems.length) {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;flex-wrap:wrap;gap:4px;padding:3px 0 5px;';
      rateItems.forEach(({ week, done, total }) => {
        const badge = document.createElement('span');
        badge.style.cssText = 'font-size:10px;background:#f0f4f8;border-radius:3px;padding:1px 6px;color:#555;';
        badge.textContent = `${week}週 ${done}/${total}`;
        row.appendChild(badge);
      });
      titleEl.insertAdjacentElement('afterend', row);
    }

    return wrap.firstChild;
  }

  // 新規入力フォームの下書き（日付単位でlocalStorageに退避）
  function newDraftKey(dateStr){ return `newDraft_${dateStr}`; }
  function saveNewDraft(){
    if(!selectedDate) return;
    const d={ category: document.getElementById('nf_category')?.value || '' };
    let any = !!d.category;
    FIELD_DEFS.forEach(f=>{ const v=document.getElementById(`nf_${f.key}`)?.value||''; d[f.key]=v; if(v) any=true; });
    if(any) localStorage.setItem(newDraftKey(selectedDate), JSON.stringify(d));
    else    localStorage.removeItem(newDraftKey(selectedDate));
  }
  function hydrateNewForm(){
    // 下書き復元
    try{
      const raw=localStorage.getItem(newDraftKey(selectedDate));
      if(raw){ const d=JSON.parse(raw);
        const cat=document.getElementById('nf_category'); if(cat&&d.category) cat.value=d.category;
        FIELD_DEFS.forEach(f=>{ const el=document.getElementById(`nf_${f.key}`); if(el&&d[f.key]) el.value=d[f.key]; });
      }
    }catch(e){}
    // 入力のたびに下書き保存
    const cat=document.getElementById('nf_category'); if(cat) cat.addEventListener('change', saveNewDraft);
    FIELD_DEFS.forEach(f=>{ const el=document.getElementById(`nf_${f.key}`); if(el) el.addEventListener('input', saveNewDraft); });
  }

    const entry={id:generateId(),createdAt:new Date().toISOString()};

  // ===== MEMO DATA =====
  let memoData = { idea: [], maxim: [], ekohiki: [], goal: '', weeklyGoals: {}, monthlyGoals: {}, bookmarks: [], like: [], dislike: [], habits: [] };

  function getWeekKey(dateStr) {
    const d = new Date(dateStr), dow = (d.getDay()+6)%7;
    const mon = new Date(d); mon.setDate(d.getDate()-dow);
    return formatDate(mon); // 月曜日の日付をキーに
  }
  function getMonthKey(dateStr) {
    const [y,m] = dateStr.split('-'); return `${y}-${m}`;
  }
  let currentMemoType = null;

  function loadMemosFromLocal() {
    try {
      memoData.idea         = JSON.parse(localStorage.getItem('ideaMemos')     || '[]');
      memoData.maxim        = JSON.parse(localStorage.getItem('maximMemos')    || '[]');
      memoData.ekohiki      = JSON.parse(localStorage.getItem('ekohikiMemos')  || '[]');
      memoData.goal         = localStorage.getItem('goalMemo') || '';
      memoData.weeklyGoals  = JSON.parse(localStorage.getItem('weeklyGoals')  || '{}');
      memoData.monthlyGoals = JSON.parse(localStorage.getItem('monthlyGoals') || '{}');
      memoData.bookmarks    = JSON.parse(localStorage.getItem('bookmarks')    || '[]');
      memoData.like         = JSON.parse(localStorage.getItem('likeMemos')    || '[]');
      memoData.dislike      = JSON.parse(localStorage.getItem('dislikeMemos') || '[]');
      memoData.habits       = JSON.parse(localStorage.getItem('habitMemos')   || '[]');
    } catch { memoData = { idea: [], maxim: [], ekohiki: [], goal: '', weeklyGoals: {}, monthlyGoals: {}, bookmarks: [], like: [], dislike: [], habits: [] }; }
  }

  async function loadMemosFromFirestore() {
    try {
      const ref = db.collection('users').doc(currentUser.uid).collection('memos');
      const [ideaDoc, maximDoc, ekohikiDoc, goalDoc, weekDoc, monthDoc, bmDoc, likeDoc, dislikeDoc, habitsDoc] = await Promise.all([
        ref.doc('idea').get(), ref.doc('maxim').get(), ref.doc('ekohiki').get(), ref.doc('goal').get(),
        ref.doc('weeklyGoals').get(), ref.doc('monthlyGoals').get(),
        ref.doc('bookmarks').get(), ref.doc('like').get(), ref.doc('dislike').get(), ref.doc('habits').get()
      ]);
      memoData.idea         = ideaDoc.exists      ? ideaDoc.data().entries      || [] : [];
      memoData.maxim        = maximDoc.exists     ? maximDoc.data().entries     || [] : [];
      memoData.ekohiki      = ekohikiDoc.exists   ? ekohikiDoc.data().entries   || [] : [];
      memoData.goal         = goalDoc.exists      ? goalDoc.data().text         || '' : '';
      memoData.weeklyGoals  = weekDoc.exists      ? weekDoc.data().goals        || {} : {};
      memoData.monthlyGoals = monthDoc.exists     ? monthDoc.data().goals       || {} : {};
      memoData.bookmarks    = bmDoc.exists        ? bmDoc.data().entries        || [] : [];
      memoData.like         = likeDoc.exists      ? likeDoc.data().entries      || [] : [];
      memoData.dislike      = dislikeDoc.exists   ? dislikeDoc.data().entries   || [] : [];
      memoData.habits       = habitsDoc.exists    ? habitsDoc.data().entries    || [] : [];
    } catch(e) { console.error('Memo load error:', e); }
  }

  async function saveMemos(type) {
    if (isFirebaseMode && db && currentUser) {
      try {
        const ref = db.collection('users').doc(currentUser.uid).collection('memos');
        if (type === 'goal')         await ref.doc('goal').set({ text: memoData.goal });
        else if (type === 'weeklyGoals')  await ref.doc('weeklyGoals').set({ goals: memoData.weeklyGoals });
        else if (type === 'monthlyGoals') await ref.doc('monthlyGoals').set({ goals: memoData.monthlyGoals });
        else await ref.doc(type).set({ entries: memoData[type] });
      } catch(e) { alert('保存エラー: ' + e.message); }
    } else {
      if (type === 'goal')         localStorage.setItem('goalMemo', memoData.goal);
      else if (type === 'weeklyGoals')  localStorage.setItem('weeklyGoals', JSON.stringify(memoData.weeklyGoals));
      else if (type === 'monthlyGoals') localStorage.setItem('monthlyGoals', JSON.stringify(memoData.monthlyGoals));
      else if (type === 'bookmarks') localStorage.setItem('bookmarks', JSON.stringify(memoData.bookmarks));
      else if (type === 'like')      localStorage.setItem('likeMemos',    JSON.stringify(memoData.like));
      else if (type === 'dislike')   localStorage.setItem('dislikeMemos', JSON.stringify(memoData.dislike));
      else if (type === 'habits')    localStorage.setItem('habitMemos',   JSON.stringify(memoData.habits));
      else if (type === 'ekohiki')   localStorage.setItem('ekohikiMemos', JSON.stringify(memoData.ekohiki));
      else localStorage.setItem(type === 'idea' ? 'ideaMemos' : 'maximMemos', JSON.stringify(memoData[type]));
    }
  }

  // えこひいきバナー（1エントリのナンバリングテキストから1項目をランダム表示）
  function updateEkohikiBanner() {
    const banner = document.getElementById('ekohikiBanner');
    const textEl = document.getElementById('ekohikiText');
    if (!memoData.ekohiki || memoData.ekohiki.length === 0) { banner.style.display = 'none'; return; }
    const rawText = memoData.ekohiki[0].text;
    const items = rawText.split(/\d+\.\s+/).map(s => s.trim()).filter(Boolean);
    if (items.length === 0) { banner.style.display = 'none'; return; }
    const seed = parseInt(todayStr().replace(/-/g, ''));

    textEl.textContent = `「${items[idx]}」`;
    banner.style.display = 'block';

  function openGoalModal() {
    const base = selectedDate || todayStr();
    const wKey = getWeekKey(base), mKey = getMonthKey(base);
    const sel = new Date(base), dow = (sel.getDay()+6)%7;
    const mon = new Date(sel); mon.setDate(sel.getDate()-dow);
    const sun = new Date(mon); sun.setDate(mon.getDate()+6);
    const [,mm,md] = formatDate(mon).split('-'), [,sm,sd] = formatDate(sun).split('-');
    const [my, mmm] = mKey.split('-');
    document.getElementById('goalWeekLabel').textContent  = `${parseInt(mm)}/${parseInt(md)}〜${parseInt(sm)}/${parseInt(sd)}`;
    document.getElementById('goalMonthLabel').textContent = `${my}年${parseInt(mmm)}月`;
    document.getElementById('goalInput').value      = memoData.goal || '';
    document.getElementById('goalWeekInput').value  = memoData.weeklyGoals[wKey]  || '';
    document.getElementById('goalMonthInput').value = memoData.monthlyGoals[mKey] || '';

    document.getElementById('goalModal').style.display = 'none';

  async function saveGoal() {
    const base = selectedDate || todayStr();
    const wKey = getWeekKey(base), mKey = getMonthKey(base);
    memoData.goal = document.getElementById('goalInput').value.trim();
    const wVal = document.getElementById('goalWeekInput').value.trim();
    const mVal = document.getElementById('goalMonthInput').value.trim();
    if (wVal) memoData.weeklyGoals[wKey]  = wVal; else delete memoData.weeklyGoals[wKey];
    if (mVal) memoData.monthlyGoals[mKey] = mVal; else delete memoData.monthlyGoals[mKey];

    renderLeftPanel();
    closeGoalModal();

    const entry = memoData[currentMemoType].find(e => e.id === id);
    if (!entry) return;
    const div = document.getElementById(`memo-entry-${id}`);
    const textEl = div.querySelector('.memo-entry-text');
    if (div.querySelector('.memo-entry-edit-area')) return; // already editing

    const editArea = document.createElement('div');
    editArea.className = 'memo-entry-edit-area';

  async function toggleHabitPause(id) {
    const idx = memoData.habits.findIndex(h => h.id === id);
    if (idx === -1) return;
    memoData.habits[idx].paused = !memoData.habits[idx].paused;
    await saveMemos('habits');
    renderHabitEntries();
    renderLeftPanel();
  }

  async function deleteHabitEntry(id) {
    if (!confirm('削除しますか？')) return;
    memoData.habits = memoData.habits.filter(e => e.id !== id);
    await saveMemos('habits');
    renderHabitEntries();
    renderLeftPanel();
  }

  function moveHabitEntry(id, dir) {
    const idx = memoData.habits.findIndex(h => h.id === id);
    if (idx === -1) return;
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= memoData.habits.length) return;
    [memoData.habits[idx], memoData.habits[newIdx]] = [memoData.habits[newIdx], memoData.habits[idx]];
    saveMemos('habits');
    renderHabitEntries();
    renderLeftPanel();
  }

  function renderHabitEntries() {
    const list = document.getElementById('habitEntriesList');
    if (!memoData.habits.length) { list.innerHTML = '<div class="empty-message">まだ登録がありません</div>'; return; }
    list.innerHTML = `<div class="memo-entries-header">登録済み（${memoData.habits.length}件）</div>`;
    const DOW_LABELS = ['日','月','火','水','木','金','土'];
    memoData.habits.forEach((h, idx) => {
      const div = document.createElement('div');
      div.className = 'habit-entry' + (h.paused ? ' paused' : '');
      div.id = `habit-entry-${h.id}`;

      // 優先順位ボタン
      const orderBtns = document.createElement('div');
      orderBtns.className = 'habit-order-btns';
      if (idx > 0) {
        const upBtn = document.createElement('button');
        upBtn.className = 'habit-order-btn'; upBtn.title = '上に移動'; upBtn.textContent = '▲';
        upBtn.addEventListener('click', () => moveHabitEntry(h.id, -1));
        orderBtns.appendChild(upBtn);
      }
      if (idx < memoData.habits.length - 1) {
        const dnBtn = document.createElement('button');
        dnBtn.className = 'habit-order-btn'; dnBtn.title = '下に移動'; dnBtn.textContent = '▼';
        dnBtn.addEventListener('click', () => moveHabitEntry(h.id, 1));
        orderBtns.appendChild(dnBtn);

      const row = document.createElement('div');
      row.className = 'habit-entry-row';
      row.innerHTML = `
        <div class="habit-entry-item"><span class="habit-entry-cell-label">時間</span><span class="habit-entry-cell">${escHtml(h.time||'—')}</span></div>
        <div class="habit-entry-item"><span class="habit-entry-cell-label">習慣内容</span><span class="habit-entry-cell">${escHtml(h.content)}</span></div>
        <div class="habit-entry-item"><span class="habit-entry-cell-label">目的</span><span class="habit-entry-cell">${escHtml(h.purpose||'—')}</span></div>
        <div class="habit-entry-meta">
          <span class="habit-badge ${h.schedule==='weekdays'?'weekdays':'daily'}">${escHtml(schedLabel)}</span>

      div.appendChild(row);

      // 削除・編集・一時停止ボタン
      const delBtn = document.createElement('button');
      delBtn.className = 'btn-delete-memo'; delBtn.innerHTML = '&#x2715;';
      delBtn.addEventListener('click', () => deleteHabitEntry(h.id));
      div.appendChild(delBtn);

      const editBtn = document.createElement('button');
      editBtn.className = 'btn-delete-memo';
      editBtn.style.cssText = 'right:34px;color:#3498db;';
      editBtn.textContent = '✎'; editBtn.title = '編集';
      editBtn.addEventListener('click', () => editHabitEntry(h.id));
      div.appendChild(editBtn);

      const pauseBtn = document.createElement('button');
      pauseBtn.className = 'btn-delete-memo';
      pauseBtn.style.cssText = `right:58px;color:${h.paused ? '#27ae60' : '#e67e22'};`;
      pauseBtn.textContent = h.paused ? '▶' : '⏸';
      pauseBtn.title = h.paused ? '再開' : '一時停止';
      pauseBtn.addEventListener('click', () => toggleHabitPause(h.id));
      div.appendChild(pauseBtn);

      list.appendChild(div);
    });
  }

  // ===== BOOKMARK =====
  function isBookmarked(entryId, fieldKey) {
    return memoData.bookmarks.some(b => b.entryId === entryId && b.fieldKey === fieldKey);
  }
  async function toggleBookmark(entryId, fieldKey, dateStr, label, text) {
    const idx = memoData.bookmarks.findIndex(b => b.entryId === entryId && b.fieldKey === fieldKey);
    if (idx >= 0) {
      memoData.bookmarks.splice(idx, 1);
    } else {
      memoData.bookmarks.unshift({ id: generateId(), entryId, fieldKey, dateStr, label, text, createdAt: new Date().toISOString() });
    }
    await saveMemos('bookmarks');
    renderLearningList();
  }
  function renderBookmarkFilterRow() {
    const row = document.getElementById('bookmarkFilterRow');
    row.innerHTML = '';

    // 月フィルタ
    const months = [...new Set(memoData.bookmarks.map(b => b.dateStr.slice(0,7)))].sort().reverse();
    if (months.length > 0) {
      const monthRow = document.createElement('div');
      monthRow.style.cssText = 'display:flex;align-items:center;gap:6px;margin-bottom:6px;';
      const lbl = document.createElement('span');
      lbl.style.cssText = 'font-size:11px;color:#888;';
      lbl.textContent = '月：';
      const sel = document.createElement('select');
      sel.className = 'category-select';
      sel.style.cssText = 'font-size:12px;padding:2px 6px;';
      [['__all__','すべて'], ...months.map(m => [m, m.replace('-','年')+'月'])].forEach(([v,t]) => {
        const opt = document.createElement('option');
        opt.value = v; opt.textContent = t;
        if (v === bookmarkMonthFilter) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', () => { bookmarkMonthFilter = sel.value; renderBookmarkList(); });
      monthRow.appendChild(lbl);
      monthRow.appendChild(sel);
      row.appendChild(monthRow);
    }

    // カテゴリボタン（ブックマーク内に存在するカテゴリのみ）
    const allData = loadData();
    const usedCats = new Set(memoData.bookmarks.map(b => {
      const e = (allData[b.dateStr]||[]).find(o => o.id === b.entryId);
      return e ? (e.category || '') : '';
    }));
    const filters = [
      { value: '__all__', label: 'すべて', cls: '' },
      ...CATEGORIES.filter(c => c.value && usedCats.has(c.value)),
      ...(usedCats.has('') ? [{ value: '__none__', label: 'カテゴリなし', cls: '' }] : []),
    ];
    if (filters.length > 1) {
      const catRow = document.createElement('div');
      filters.forEach(f => {
        const btn = document.createElement('button');
        btn.className = `learning-filter-btn${f.cls?' '+f.cls:''}${bookmarkCatFilter===f.value?' active':''}`;
        btn.textContent = f.label;
        btn.addEventListener('click', () => {
          bookmarkCatFilter = f.value;
          renderBookmarkFilterRow();
          renderBookmarkList();
        });
        catRow.appendChild(btn);
      });
      row.appendChild(catRow);
    }
  }
