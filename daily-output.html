  function renderBookmarkList() {
    const list = document.getElementById('bookmarkList');
    const allData = loadData();

    const filteredBookmarks = memoData.bookmarks.filter(b => {
      if (bookmarkMonthFilter !== '__all__' && b.dateStr.slice(0,7) !== bookmarkMonthFilter) return false;
      if (bookmarkCatFilter !== '__all__') {
        const e = (allData[b.dateStr]||[]).find(o => o.id === b.entryId);
        const cat = e ? (e.category || '') : '';
        if (bookmarkCatFilter === '__none__' && cat !== '') return false;
        if (bookmarkCatFilter !== '__none__' && cat !== bookmarkCatFilter) return false;
      }
      return true;
    });

    if (!filteredBookmarks.length) {
      list.innerHTML = `<div class="empty-message">${memoData.bookmarks.length ? '絞り込み結果がありません' : 'ブックマークはありません'}</div>`; return;
    }
    list.innerHTML = '';
    // 日付ごとにグループ化
    const byDate = {};
    filteredBookmarks.forEach(b => {
      if (!byDate[b.dateStr]) byDate[b.dateStr] = [];
      byDate[b.dateStr].push(b);
    });
    const sortedDates = Object.keys(byDate).sort().reverse();
    sortedDates.forEach(dateStr => {
      const dateDiv = document.createElement('div');
      const dateLabel = document.createElement('div');
      dateLabel.className = 'learning-date-header';
      dateLabel.textContent = formatDateJP(dateStr);
      dateDiv.appendChild(dateLabel);
      byDate[dateStr].forEach(b => {
        // ブックマーク全体をまとめるラッパー
        const wrapper = document.createElement('div');
        wrapper.className = 'bookmark-entry-wrapper';

        // ③概念化メインカード
        const item = document.createElement('div');
        item.className = 'learning-entry conceptualization';
        item.style.position = 'relative';
        // カテゴリバッジ
        const entries = allData[dateStr] || [];
        const entry = entries.find(o => o.id === b.entryId);
        if (entry && entry.category) {
          const cat = categoryInfo(entry.category);
          const badge = document.createElement('span');
          badge.className = `category-badge ${cat.cls}`;
          badge.textContent = cat.label;
          badge.style.cssText = 'display:inline-block;margin-bottom:6px;font-size:10px;';
          item.appendChild(badge);
        }
        const labelDiv = document.createElement('div');
        labelDiv.className = 'learning-entry-label';
        labelDiv.textContent = b.label;
        const textDiv = document.createElement('div');
        textDiv.className = 'learning-entry-text';
        textDiv.innerHTML = linkifyText(b.text);
        const delBtn = document.createElement('button');
        delBtn.className = 'btn-bookmark-learning';
        delBtn.textContent = '⭐';
        delBtn.title = 'ブックマーク解除';
        delBtn.addEventListener('click', () => deleteBookmark(b.id));
        item.appendChild(labelDiv);
        item.appendChild(textDiv);
        item.appendChild(delBtn);
        wrapper.appendChild(item);

        // ②④～⑧の補足フィールドを表示
        if (entry) {
          BOOKMARK_SUB_FIELDS.forEach(({ key, label }) => {
            if (!entry[key]) return;
            const subItem = document.createElement('div');
            subItem.className = 'learning-entry bookmark-sub-field';
            const subLabel = document.createElement('div');
            subLabel.className = 'learning-entry-label';
            subLabel.textContent = label;
            const subText = document.createElement('div');
            subText.className = 'learning-entry-text';
            subText.innerHTML = linkifyText(entry[key]);
            subItem.appendChild(subLabel);
            subItem.appendChild(subText);
            wrapper.appendChild(subItem);
          });
        }
        dateDiv.appendChild(wrapper);
      });
      list.appendChild(dateDiv);
    });
  }
  async function deleteBookmark(id) {
    memoData.bookmarks = memoData.bookmarks.filter(b => b.id !== id);
    await saveMemos('bookmarks');
    renderBookmarkList();
    renderLearningList();
  }

  // ===== LIKE / DISLIKE =====
  let currentLDTab = 'like';
  function openLikeDislikeModal() {
    switchLDTab('like');
    document.getElementById('likedislikeModal').style.display = 'flex';
  }
  function closeLikeDislikeModal() {
    document.getElementById('likedislikeModal').style.display = 'none';
  }
  function switchLDTab(tab) {
    currentLDTab = tab;
    document.getElementById('tab-like').className    = 'ld-tab' + (tab==='like'    ? ' active-like'    : '');
    document.getElementById('tab-dislike').className = 'ld-tab' + (tab==='dislike' ? ' active-dislike'  : '');
    document.getElementById('ldInput').placeholder   = tab === 'like' ? '好きなことを書き留めてください...' : '嫌いなことを書き留めてください...';
    document.getElementById('ldSaveBtn').style.background = tab === 'like' ? '#e74c3c' : '#3498db';
    document.getElementById('ldInput').value = '';
    renderLDEntries();
  }
  async function saveLDEntry() {
    const text = document.getElementById('ldInput').value.trim();
    if (!text) { alert('内容を入力してください。'); return; }
    memoData[currentLDTab].unshift({ id: generateId(), text, createdAt: new Date().toISOString() });
    await saveMemos(currentLDTab);
    document.getElementById('ldInput').value = '';
    renderLDEntries();
  }
  async function deleteLDEntry(tab, id) {
    if (!confirm('削除しますか？')) return;
    memoData[tab] = memoData[tab].filter(e => e.id !== id);
    await saveMemos(tab);
    renderLDEntries();
  }
  function renderLDEntries() {
    const list = document.getElementById('ldEntriesList');
    const entries = memoData[currentLDTab] || [];
    if (!entries.length) { list.innerHTML = '<div class="empty-message">まだ登録がありません</div>'; return; }
    list.innerHTML = `<div class="memo-entries-header">保存済み（${entries.length}件）</div>`;
    entries.forEach(e => {
      const div = document.createElement('div');
      div.className = 'memo-entry';
      div.innerHTML = `
        <div class="memo-entry-date">${new Date(e.createdAt).toLocaleDateString('ja-JP')}</div>
        <div class="memo-entry-text">${linkifyText(e.text)}</div>
        <button class="btn-delete-memo" onclick="deleteLDEntry('${currentLDTab}','${e.id}')">&#x2715;</button>`;
      list.appendChild(div);
    });
  }

  // ===== カテゴリ =====
  const CATEGORIES = [
    { value: '',            label: 'カテゴリなし',         cls: '' },
    { value: 'news',        label: 'ニュース',             cls: 'cat-news' },
    { value: 'bookclub',    label: '読書部',               cls: 'cat-bookclub' },
    { value: 'reading',     label: '読書',                 cls: 'cat-reading' },
    { value: 'action_plan', label: '今月のアクションプラン', cls: 'cat-action-plan' },
    { value: 'biz',         label: '事業候補生',           cls: 'cat-biz' },
    { value: 'other',       label: 'その他',               cls: 'cat-other' },
  ];
  function categoryInfo(value) {
    return CATEGORIES.find(c => c.value === value) || CATEGORIES[0];
  }
  function categorySelectHTML(id, selected='') {
    const opts = CATEGORIES.map(c =>
      `<option value="${c.value}"${c.value===selected?' selected':''}>${c.label}</option>`
    ).join('');
    return `<div class="category-select-wrap">
      <label>カテゴリ</label>
      <select class="category-select" id="${id}">${opts}</select>
    </div>`;
  }

  // ===== 学びの一覧 =====
  const LEARNING_KEYS = ['conceptualization', 'experience', 'reflection', 'practice', 'concrete_abstract', 'whywhy'];
  const LEARNING_LABELS = {
    experience:        '① 経験',
    reflection:        '② 振り返り',
    conceptualization: '③ 概念化',
    practice:          '④ 実践',
    concrete_abstract: '⑤ 具体→抽象→具体',
    whywhy:            '⑥ なぜなぜ分析',
  };

  async function saveCategoryForEntry(dateStr, entryId, newCategory) {
    const data = loadData();
    const entries = data[dateStr] || [];
    const idx = entries.findIndex(e => e.id === entryId);
    if (idx === -1) return;
    entries[idx].category = newCategory;
    await saveDataForDate(dateStr, entries);
    // 右パネルが該当日を表示中なら再描画
    if (selectedDate === dateStr) renderRightPanel();
  }

  let learningFilter      = '__all__';
  let learningMonthFilter = '__all__';
  let bookmarkMonthFilter = '__all__';
  let bookmarkCatFilter   = '__all__';

  function renderLearningFilterRow() {
    const row = document.getElementById('learningFilterRow');
    row.innerHTML = '';

    // 月フィルタ
    const data = loadData();
    const months = [...new Set(Object.keys(data).map(d => d.slice(0,7)))].sort().reverse();
    if (months.length > 0) {
      const monthRow = document.createElement('div');
      monthRow.style.cssText = 'display:flex;align-items:center;gap:6px;margin-bottom:6px;';
      const lbl = document.createElement('span');
      lbl.style.cssText = 'font-size:11px;color:#888;';
      lbl.textContent = '月：';
      const sel = document.createElement('select');
      sel.className = 'category-select';
      sel.style.cssText = 'font-size:12px;padding:2px 6px;';
      [['__all__','すべて'], ...months.map(m => [m, m.replace('-','年')+'月'])].forEach(([v,t]) => {
        const opt = document.createElement('option');
        opt.value = v; opt.textContent = t;
        if (v === learningMonthFilter) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', () => { learningMonthFilter = sel.value; renderLearningList(); });
      monthRow.appendChild(lbl);
      monthRow.appendChild(sel);
      row.appendChild(monthRow);
    }

    // カテゴリボタン
    const catRow = document.createElement('div');
    const filters = [
      { value: '__all__', label: 'すべて', cls: '' },
      ...CATEGORIES.filter(c => c.value),
      { value: '__none__', label: 'カテゴリなし', cls: '' },
    ];
    filters.forEach(f => {
      const btn = document.createElement('button');
      btn.className = `learning-filter-btn${f.cls ? ' ' + f.cls : ''}${learningFilter === f.value ? ' active' : ''}`;
      btn.textContent = f.label;
      btn.addEventListener('click', () => {
        learningFilter = f.value;
        renderLearningFilterRow();
        renderLearningList();
      });
      catRow.appendChild(btn);
    });
    row.appendChild(catRow);
  }

  function openLearningModal() {
    learningFilter      = '__all__';
    learningMonthFilter = '__all__';
    renderLearningFilterRow();
    renderLearningList();
    document.getElementById('learningModal').style.display = 'flex';
  }
  function closeLearningModal() {
    document.getElementById('learningModal').style.display = 'none';
  }
  function renderLearningList() {
    const list = document.getElementById('learningList');
    const data = loadData();
    const matchesFilter = o => {
      if (learningFilter !== '__all__') {
        if (learningFilter === '__none__' && o.category) return false;
        if (learningFilter !== '__none__' && o.category !== learningFilter) return false;
      }
      return true;
    };
    const dates = Object.keys(data)
      .filter(d => {
        if (learningMonthFilter !== '__all__' && d.slice(0,7) !== learningMonthFilter) return false;
        return (data[d]||[]).some(o => matchesFilter(o) && LEARNING_KEYS.some(k => o[k]));
      })
      .sort().reverse();
    if (dates.length === 0) {
      list.innerHTML = '<div class="empty-message">まだ記録がありません</div>';
      return;
    }
    list.innerHTML = '';
    dates.forEach(dateStr => {
      const entries = data[dateStr] || [];
      const dateDiv = document.createElement('div');
      const dateLabel = document.createElement('div');
      dateLabel.className = 'learning-date-header';
      dateLabel.textContent = formatDateJP(dateStr);
      dateDiv.appendChild(dateLabel);
      entries.forEach((o, oi) => {
        const hasFields = LEARNING_KEYS.some(k => o[k]);
        if (!hasFields) return;
        if (!matchesFilter(o)) return;

        // カテゴリ選択行
        const catRow = document.createElement('div');
        catRow.className = 'learning-category-row';
        const catInfo = categoryInfo(o.category || '');
        const catSelect = document.createElement('select');
        catSelect.className = 'category-select learning-cat-select';
        CATEGORIES.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.value;
          opt.textContent = c.label;
          if (c.value === (o.category || '')) opt.selected = true;
          catSelect.appendChild(opt);
        });
        catSelect.addEventListener('change', () => {
          saveCategoryForEntry(dateStr, o.id, catSelect.value);
          // バッジ色を即時更新
          const badge = catRow.querySelector('.cat-badge-inline');
          const newCat = categoryInfo(catSelect.value);
          badge.textContent = newCat.value ? newCat.label : '';
          badge.className = `cat-badge-inline category-badge ${newCat.cls}`;
          badge.style.display = newCat.value ? '' : 'none';
        });
        const badge = document.createElement('span');
        badge.className = `cat-badge-inline category-badge ${catInfo.cls}`;
        badge.textContent = catInfo.value ? catInfo.label : '';
        badge.style.display = catInfo.value ? '' : 'none';
        catRow.appendChild(badge);
        catRow.appendChild(catSelect);
        dateDiv.appendChild(catRow);

        // フィールド一覧
        LEARNING_KEYS.forEach(key => {
          if (!o[key]) return;
          const item = document.createElement('div');
          item.className = `learning-entry${key === 'conceptualization' ? ' conceptualization' : ''}`;
          item.style.position = 'relative';
          const labelDiv = document.createElement('div');
          labelDiv.className = 'learning-entry-label';
          labelDiv.textContent = LEARNING_LABELS[key];
          const textDiv = document.createElement('div');
          textDiv.className = 'learning-entry-text';
          textDiv.innerHTML = linkifyText(o[key]);
          item.appendChild(labelDiv);
          item.appendChild(textDiv);
          if (key === 'conceptualization') {
            const bookmarked = isBookmarked(o.id, key);
            const bmBtn = document.createElement('button');
            bmBtn.className = 'btn-bookmark-learning';
            bmBtn.textContent = bookmarked ? '⭐' : '☆';
            bmBtn.title = bookmarked ? 'ブックマーク解除' : 'ブックマークに追加';
            bmBtn.addEventListener('click', () => {
              toggleBookmark(o.id, key, dateStr, LEARNING_LABELS[key], o[key]);
            });
            item.appendChild(bmBtn);
          }
          dateDiv.appendChild(item);
        });
      });
      list.appendChild(dateDiv);
    });
  }

  // モーダル外クリックで閉じる
  document.getElementById('memoModal').addEventListener('click', e => {
    if (e.target === document.getElementById('memoModal')) closeMemoModal();
  });
  document.getElementById('goalModal').addEventListener('click', e => {
    if (e.target === document.getElementById('goalModal')) closeGoalModal();
  });
  document.getElementById('learningModal').addEventListener('click', e => {
    if (e.target === document.getElementById('learningModal')) closeLearningModal();
  });
  document.getElementById('bookmarkModal').addEventListener('click', e => {
    if (e.target === document.getElementById('bookmarkModal')) closeBookmarkModal();
  });
  document.getElementById('likedislikeModal').addEventListener('click', e => {
    if (e.target === document.getElementById('likedislikeModal')) closeLikeDislikeModal();
  });

  // ===== NAVIGATION =====
  document.getElementById('prevMonth').addEventListener('click', ()=>{
    if(--currentMonth<0){currentMonth=11;currentYear--;} renderCalendar();
  });
  document.getElementById('nextMonth').addEventListener('click', ()=>{
    if(++currentMonth>11){currentMonth=0;currentYear++;} renderCalendar();
  });
  let resizeTimer;
  window.addEventListener('resize', ()=>{
    clearTimeout(resizeTimer);
    resizeTimer=setTimeout(()=>{
      // 入力中は再描画しない（フォーカス中の要素、または未保存の入力があるとき）
      const ae=document.activeElement, tag=ae?ae.tagName:'';
      if(tag==='TEXTAREA'||tag==='SELECT'||tag==='INPUT') return;
      if(typeof hasUnsavedInput==='function' && hasUnsavedInput()) return;
      if(selectedDate){renderLeftPanel();renderRightPanel();}
    },150);
  });

  // ===== RELOAD WARNING =====
  function hasUnsavedInput() {
    return FIELD_DEFS.some(f => {
      const el = document.getElementById(`nf_${f.key}`);
      return el && el.value.trim() !== '';
    });
  }
  function showReloadWarning() {
    document.getElementById('reloadWarningModal').style.display = 'flex';
  }
  function closeReloadWarning() {
    document.getElementById('reloadWarningModal').style.display = 'none';
  }
  function confirmReload() {
    window.location.reload();
  }

  // F5 / Ctrl+R / Cmd+R をインターセプト
  document.addEventListener('keydown', e => {
    if (e.key === 'F5' || ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'r')) {
      if (hasUnsavedInput()) {
        e.preventDefault();
        showReloadWarning();
      }
    }
  });

  // タブを閉じる・URLバーで遷移するケース（ブラウザ標準ダイアログ）
  window.addEventListener('beforeunload', e => {
    if (hasUnsavedInput()) {
      e.preventDefault();
      e.returnValue = '';
    }
  });

  // ===== START =====
  initStorage();
</script>
</body>
</html>
